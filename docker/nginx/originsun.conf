# Website_Nginx 設定 — 服務 Astro static dist/ + 反代 /api/website/* 到 website-api 容器
#
# 部署：
#   1. 此檔放在 NAS /share/.../Website/docker/nginx/originsun.conf
#   2. docker cp 進 Website_Nginx 的 /etc/nginx/conf.d/default.conf
#   3. docker exec Website_Nginx nginx -s reload

# ── apex（裸網域）301 → www（2026-07-03 上線：canonical 統一 www、單一主機、少一跳）──
server {
    listen 80;
    server_name originsun-studio.com;
    return 301 https://www.originsun-studio.com$request_uri;
}

server {
    # default_server：明確指定為預設 server，避免上面 apex block（排在前面）搶走
    # 所有非精確匹配的流量（含 www）→ 造成 www→www 無限迴圈。
    listen 80 default_server;
    server_name www.originsun-studio.com _;
    root /usr/share/nginx/html;

    # cloudflared→nginx 走 http（$scheme=http），故 return 301 的相對路徑會被 nginx
    # 絕對化成 http://…→多一跳 http→https。關掉 → Location 保持相對、瀏覽器用當前
    # https origin 解析 → 舊網址 301 單跳直達 https 新站（保 SEO 權重）。
    absolute_redirect off;

    # 圖片 / 表單上傳（admin showcase gallery 等）— nginx 預設 1MB 太小
    client_max_body_size 20m;

    # ── SEO 硬 301 redirects（自動產出，DO NOT EDIT BY HAND） ──
    # 來源：master 的 publish_update.sync_redirects_to_nas() 拉
    # GET /api/website/redirects → 寫進 redirects.conf + nginx -s reload。
    # glob 匹配避免檔案順序耦合（snippet 還沒建時 nginx -t 也不會失敗）。
    include /etc/nginx/snippets/*.conf;

    # 安全標頭 — `always` 才會在 4xx/5xx 回應也帶上
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 反代 API 到 website-api 容器 ──
    # cloudflared / 跨機 admin Tab 都打 /api/website/* → 進這條規則 → website-api:8001
    location /api/website/ {
        proxy_pass http://website-api:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # CORS preflight 由 website-api 的 CORSMiddleware 處理，不在這裡攔
    }

    # ── healthz 直通（不經 API，給 cloudflared 健康檢查用）──
    location = /healthz {
        proxy_pass http://website-api:8001/healthz;
        proxy_set_header Host $host;
        access_log off;
    }

    # 通用快取規則（Astro hash 過的檔可長期 cache）— `^~` prefix 比 regex 快
    # 且 short-circuit：matched 就不再走後面 location /
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 執行期上傳檔（團隊頭像 /uploads/team、文章圖片 /uploads/posts）──
    # 這些檔由 website-api 寫進容器 /app/uploads/、且 main.py mount StaticFiles("/uploads")
    # 對外 serve；故反代給 website-api（不在 build 出來的 dist/ 裡，不能走 location /）。
    location ^~ /uploads/ {
        proxy_pass http://website-api:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Astro 靜態 dist/ 服務（fallback）──
    # /works, /about, 首頁等都進這條。Astro static 對每個 route 都生成
    # `<route>/index.html`，所以 try_files 兩條就夠（拿掉中間的 $uri/）。
    location / {
        index index.html;
        try_files $uri $uri/index.html =404;
    }
}
