<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>個人工作台｜ORIGINSUN</title>
<!-- N0 個人工作台（獨立頁，仿官網設計語彙：白底/旭日紅/大字距/髮絲邊框）。
     員工從官網「登入」進來；同源共用 localStorage auth_token（與內部 App 同一登入態）。
     資料來源 /api/v1/me/*（own-scope，卡片依帳號 me_* 權限渲染 — 後端守衛，非前端裝飾）。 -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root { --red: #c9372c; --ink: #262626; --sub: #737373; --line: #e5e5e5; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #fff; color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
.eyebrow { font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--sub); }
.accent { color: var(--red); }

/* ── Header（仿官網：fixed 白底 blur + 髮絲下框）── */
header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(229,229,229,0.6);
}
.header-inner {
    max-width: 1100px; margin: 0 auto; padding: 0 20px; height: 64px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-name { font-size: 13px; letter-spacing: 0.25em; font-weight: 300; color: var(--ink); }
.header-right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--sub); }
.btn-ghost {
    background: none; border: 1px solid var(--line); border-radius: 2px;
    padding: 6px 14px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--sub); cursor: pointer; transition: all .15s; font-family: inherit;
}
.btn-ghost:hover { color: var(--red); border-color: var(--red); }

main { max-width: 1100px; margin: 0 auto; padding: 104px 20px 80px; }

/* ── 登入卡 ── */
#login-view { display: none; max-width: 400px; margin: 10vh auto 0; }
.login-card { border: 1px solid var(--line); padding: 40px 36px; }
.login-card h1 { font-size: 22px; font-weight: 300; letter-spacing: 0.1em; margin: 18px 0 6px; }
.login-card .sub { font-size: 13px; color: var(--sub); margin-bottom: 28px; line-height: 1.7; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sub); margin-bottom: 6px; }
.field input {
    width: 100%; border: 1px solid var(--line); border-radius: 2px; padding: 10px 12px;
    font-size: 14px; font-family: inherit; color: var(--ink); background: #fff; outline: none; transition: border-color .15s;
}
.field input:focus { border-color: var(--red); }
.btn-primary {
    width: 100%; background: var(--ink); color: #fff; border: none; border-radius: 2px;
    padding: 12px; font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase;
    cursor: pointer; transition: background .15s; font-family: inherit; margin-top: 6px;
}
.btn-primary:hover { background: var(--red); }
.divider { display: none; align-items: center; gap: 12px; margin: 22px 0; color: #a3a3a3; font-size: 11px; letter-spacing: 0.2em; }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
#g_id_signin_container { display: none; justify-content: center; }
.err { display: none; color: var(--red); font-size: 12px; margin-top: 14px; line-height: 1.6; }

/* ── 註冊（兩步驟公司驗證）── */
.btn-ghost-wide {
    width: 100%; margin-top: 14px; background: none; border: 1px solid var(--line);
    border-radius: 2px; padding: 10px; font-size: 11px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--sub); cursor: pointer;
    transition: all .15s; font-family: inherit;
}
.btn-ghost-wide:hover { color: var(--red); border-color: var(--red); }
.rg-choices { display: flex; flex-direction: column; gap: 8px; }
.rg-choice {
    display: flex; align-items: center; gap: 10px; border: 1px solid var(--line);
    border-radius: 2px; padding: 10px 12px; font-size: 14px; cursor: pointer;
    transition: border-color .15s, background .15s;
}
.rg-choice:hover { border-color: var(--ink); }
.rg-choice.on { border-color: var(--red); background: #fdf7f6; }
.rg-choice input { accent-color: var(--red); }

/* ── 工作台 ── */
#ws-view { display: none; }
.greeting { margin-bottom: 40px; }
.greeting h1 { font-size: 28px; font-weight: 300; letter-spacing: 0.05em; margin-top: 10px; }
.greeting h1 b { font-weight: 500; }
.notice {
    border: 1px solid var(--line); border-left: 2px solid var(--red);
    padding: 14px 18px; font-size: 13px; color: var(--sub); margin-bottom: 28px; line-height: 1.7;
}
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 28px; }
.card { border: 1px solid var(--line); padding: 26px 26px 20px; min-width: 0; }
.card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; border-bottom: 1px solid var(--line); padding-bottom: 14px; margin-bottom: 4px; }
.card-head .count { font-size: 12px; color: var(--sub); }
.row { display: flex; gap: 12px; align-items: flex-start; padding: 13px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.row:last-child { border-bottom: none; }
.row .grow { flex: 1; min-width: 0; }
.row .title { color: var(--ink); line-height: 1.5; }
.row .meta { font-size: 11px; color: var(--sub); margin-top: 3px; letter-spacing: 0.05em; }
.pill {
    display: inline-block; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    border: 1px solid var(--line); border-radius: 999px; padding: 2px 10px; color: var(--sub); white-space: nowrap;
}
.pill.hot { border-color: var(--red); color: var(--red); }
.mini-btn {
    background: none; border: 1px solid var(--line); border-radius: 2px; padding: 3px 10px;
    font-size: 11px; color: var(--sub); cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap;
}
.mini-btn:hover { color: var(--red); border-color: var(--red); }
.empty { padding: 22px 0; font-size: 13px; color: #a3a3a3; text-align: center; }
.stat-row { display: flex; gap: 28px; padding: 16px 0 10px; }
.stat .num { font-size: 26px; font-weight: 300; }
.stat .lbl { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--sub); margin-top: 2px; }
/* profile */
.pf-line { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
.pf-line .k { width: 84px; flex-shrink: 0; font-size: 11px; letter-spacing: 0.15em; color: var(--sub); text-transform: uppercase; padding-top: 2px; }
.pf-line .v { flex: 1; min-width: 0; line-height: 1.6; overflow-wrap: break-word; }
.pf-edit input, .pf-edit textarea, .pf-edit select {
    width: 100%; border: 1px solid var(--line); border-radius: 2px; padding: 7px 10px;
    font-size: 13px; font-family: inherit; color: var(--ink); background: #fff; outline: none;
}
.pf-edit input:focus, .pf-edit textarea:focus, .pf-edit select:focus { border-color: var(--red); }
.pf-edit .inline-row { display: flex; gap: 8px; flex-wrap: wrap; }
.pf-edit .inline-row > * { width: auto; flex: 1; min-width: 90px; }
.pf-edit .field { margin-bottom: 10px; }
footer { max-width: 1100px; margin: 0 auto; padding: 0 20px 40px; }
footer .eyebrow { font-size: 10px; }
@media (max-width: 640px) {
    main { padding-top: 92px; }
    .grid { grid-template-columns: 1fr; gap: 20px; }
    .brand-name { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="brand" href="https://www.originsun-studio.com/" title="回官網">
      <img src="/img/originsun-logo.webp" alt="源日影像" style="height:34px;width:auto;display:block;">
      <span class="brand-name">個人工作台 <span class="accent">WORKSPACE</span></span>
    </a>
    <div class="header-right">
      <span id="hdr-user" style="display:none;"></span>
      <!-- 具 hr_leave 權限（管理者）才顯示：深連結內部系統人事管理（同源，dev/prod 都通） -->
      <a id="hdr-hr" class="btn-ghost" href="/#tab_hr_leave" style="display:none;text-decoration:none;">人事管理</a>
      <button id="btn-logout" class="btn-ghost" style="display:none;" onclick="doLogout()">登出</button>
    </div>
  </div>
</header>

<main>
  <!-- 登入 -->
  <div id="login-view">
    <div class="login-card">
      <div class="eyebrow">Originsun · Staff</div>
      <h1>員工登入</h1>
      <div class="sub">登入後進入你的個人工作台：專案、待辦、個人資料與工時請款。</div>
      <div id="g_id_signin_container"></div>
      <div id="login-divider" class="divider">或</div>
      <form onsubmit="doPwdLogin(event)">
        <div class="field"><label>帳號 Account</label><input id="in-user" autocomplete="username"></div>
        <div class="field"><label>密碼 Password</label><input id="in-pwd" type="password" autocomplete="current-password"></div>
        <button class="btn-primary" type="submit">登入 Sign in</button>
      </form>
      <div id="login-err" class="err"></div>
      <button class="btn-ghost-wide" type="button" onclick="showRegister()">註冊帳號 Register</button>
    </div>
  </div>

  <!-- 註冊（兩步驟公司驗證）-->
  <div id="register-view" style="display:none;max-width:400px;margin:10vh auto 0;">
    <div class="login-card">
      <div class="eyebrow">Originsun · Register</div>
      <h1>註冊帳號</h1>
      <div class="sub">回答兩個公司驗證問題即可建立帳號；確認信會寄到你的信箱。帳號先開通個人基本資料編修，其他功能由管理員開通。</div>
      <form onsubmit="doRegister(event)">
        <div class="field"><label>帳號 Account</label><input id="rg-user" autocomplete="username"></div>
        <div class="field"><label>電子信箱 Email</label><input id="rg-email" type="email" autocomplete="email" placeholder="name@example.com"></div>
        <div class="field"><label>密碼 Password</label><input id="rg-pwd" type="password" autocomplete="new-password"></div>
        <div class="field"><label>確認密碼 Confirm</label><input id="rg-pwd2" type="password" autocomplete="new-password"></div>
        <div class="field"><label>驗證一：公司統編</label><input id="rg-taxid" inputmode="numeric" placeholder="8 位數字"></div>
        <div class="field">
          <label>驗證二：公司名稱</label>
          <div id="rg-choices" class="rg-choices"></div>
        </div>
        <button class="btn-primary" type="submit">建立帳號 Create</button>
      </form>
      <div id="rg-err" class="err"></div>
      <button class="btn-ghost-wide" type="button" onclick="showLoginFromRegister()">返回登入 Back</button>
    </div>
  </div>

  <!-- 工作台 -->
  <div id="ws-view">
    <div class="greeting">
      <div class="eyebrow">My <span class="accent">Workspace</span></div>
      <h1>你好，<b id="ws-name"></b></h1>
    </div>
    <div id="ws-notice"></div>
    <div id="ws-grid" class="grid"></div>
  </div>
</main>

<footer><div class="eyebrow">© Originsun Studio · Internal</div></footer>

<script>
"use strict";
const TOKEN_KEY = "auth_token";   // 與內部 App 同 key（frontend/js/auth/auth-state.js）
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const money = (n) => "NT$ " + Number(n || 0).toLocaleString("zh-TW");
let WS = null;   // 最近一次 workspace bundle

// ⚠ 全域 fetch monkeypatch（login-modal.js）不涵蓋 /api/v1/me/* —— 本頁自帶 Authorization。
async function mfetch(path, opts = {}) {
    const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
    const tok = localStorage.getItem(TOKEN_KEY);
    if (tok) headers["Authorization"] = "Bearer " + tok;
    return fetch(path, Object.assign({}, opts, { headers }));
}

// ── 視圖切換 ──
function showLogin(msg) {
    $("ws-view").style.display = "none";
    $("register-view").style.display = "none";
    $("login-view").style.display = "block";
    $("hdr-user").style.display = "none";
    $("hdr-hr").style.display = "none";
    $("btn-logout").style.display = "none";
    if (msg) { const e = $("login-err"); e.textContent = msg; e.style.display = "block"; }
    initGoogle();
}
function doLogout() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem("auth_user");
    location.reload();
}

// ── 登入（與內部 App 打同一組端點；成功後 token 同源共用）──
function onLoginOk(d) {
    localStorage.setItem(TOKEN_KEY, d.token);
    $("login-err").style.display = "none";
    loadWorkspace();
}
async function doPwdLogin(ev) {
    ev.preventDefault();
    try {
        const r = await fetch("/api/v1/auth/login", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: $("in-user").value.trim(), password: $("in-pwd").value }),
        });
        const d = await r.json();
        if (!r.ok) { showLogin(d.detail || "登入失敗"); return; }
        onLoginOk(d);
    } catch (_) { showLogin("連線失敗，請稍後再試"); }
}
// ── 註冊（兩步驟公司驗證；答案只在伺服端比對）──
async function showRegister() {
    $("login-view").style.display = "none";
    $("register-view").style.display = "block";
    const box = $("rg-choices");
    if (!box.childElementCount) {
        let choices = [];
        try {
            const r = await fetch("/api/v1/auth/register/config");
            choices = (await r.json()).company_choices || [];
        } catch (_) { /* 載入失敗下方送出時會報錯 */ }
        // 洗牌 — 正解不固定在第一位
        for (let i = choices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [choices[i], choices[j]] = [choices[j], choices[i]];
        }
        box.innerHTML = "";
        choices.forEach(name => {
            const label = document.createElement("label");
            label.className = "rg-choice";
            const radio = document.createElement("input");
            radio.type = "radio"; radio.name = "rg-company"; radio.value = name;
            radio.addEventListener("change", () => {
                box.querySelectorAll(".rg-choice").forEach(el => el.classList.remove("on"));
                label.classList.add("on");
            });
            const span = document.createElement("span");
            span.textContent = name;
            label.appendChild(radio); label.appendChild(span);
            box.appendChild(label);
        });
    }
}
function showLoginFromRegister() {
    $("register-view").style.display = "none";
    $("rg-err").style.display = "none";
    showLogin("");
}
function _rgErr(msg) { const e = $("rg-err"); e.textContent = msg; e.style.display = "block"; }
async function doRegister(ev) {
    ev.preventDefault();
    $("rg-err").style.display = "none";
    const pwd = $("rg-pwd").value;
    if (pwd !== $("rg-pwd2").value) { _rgErr("兩次密碼不一致"); return; }
    const picked = document.querySelector('input[name="rg-company"]:checked');
    if (!picked) { _rgErr("請選擇公司名稱"); return; }
    try {
        const r = await fetch("/api/v1/auth/register", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: $("rg-user").value.trim(),
                password: pwd,
                email: $("rg-email").value.trim(),
                tax_id: $("rg-taxid").value.trim(),
                company_name: picked.value,
            }),
        });
        const d = await r.json();
        if (!r.ok) { _rgErr(d.detail || "註冊失敗"); return; }
        $("register-view").style.display = "none";
        onLoginOk(d);   // 註冊即登入，直接進工作台
        // 確認信狀態提示（工作台頂部通知列）
        setTimeout(() => {
            const n = $("ws-notice");
            if (n) n.innerHTML = '<div style="border:1px solid var(--line);padding:12px 16px;font-size:13px;color:var(--sub);margin-bottom:18px;">'
                + (d.email_sent ? "確認信已寄至你的信箱。" : "帳號已建立（確認信寄送未完成，不影響使用）。")
                + "其他功能將由管理員開通後生效。</div>";
        }, 800);
    } catch (_) { _rgErr("連線失敗，請稍後再試"); }
}

let _gisInited = false;
async function initGoogle() {
    if (_gisInited) return;
    try {
        const r = await fetch("/api/v1/auth/google/config");
        if (!r.ok) return;
        const cfg = await r.json();
        if (!cfg.enabled || !cfg.client_id) return;
        for (let i = 0; i < 40 && (typeof google === "undefined" || !google.accounts); i++)
            await new Promise(res => setTimeout(res, 150));
        if (typeof google === "undefined" || !google.accounts) return;
        google.accounts.id.initialize({
            client_id: cfg.client_id, auto_select: false, cancel_on_tap_outside: true,
            callback: async (resp) => {
                try {
                    const r2 = await fetch("/api/v1/auth/google/login", {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ credential: resp.credential }),
                    });
                    const d = await r2.json();
                    if (!r2.ok) { showLogin(d.detail || "Google 登入失敗"); return; }
                    onLoginOk(d);
                } catch (_) { showLogin("連線失敗，請稍後再試"); }
            },
        });
        google.accounts.id.renderButton($("g_id_signin_container"), {
            theme: "outline", size: "large", width: 320, text: "signin_with",
            shape: "rectangular", logo_alignment: "left",
        });
        $("g_id_signin_container").style.display = "flex";
        $("login-divider").style.display = "flex";
        _gisInited = true;
    } catch (e) { console.warn("[GIS] init failed", e); }
}

// ── 工作台載入 ──
async function loadWorkspace() {
    let r;
    try { r = await mfetch("/api/v1/me/workspace"); }
    catch (_) { showLogin("連線失敗，請稍後再試"); return; }
    if (r.status === 401) { localStorage.removeItem(TOKEN_KEY); showLogin(""); return; }
    if (r.status === 403) {
        // 帳號沒有任何 me_* 權限，或權限剛更新而 token 還是舊的
        showLogin("此帳號尚未開通個人工作台（或權限剛更新）— 請聯絡管理員，或重新登入一次。");
        localStorage.removeItem(TOKEN_KEY);
        return;
    }
    if (!r.ok) { showLogin("載入失敗（" + r.status + "），請稍後再試"); return; }
    WS = await r.json();
    renderWorkspace();
}

function renderWorkspace() {
    const ws = WS;
    $("login-view").style.display = "none";
    $("ws-view").style.display = "block";
    const display = (ws.profile && ws.profile.name) || ws.username || "";
    $("ws-name").textContent = display;
    $("hdr-user").textContent = display;
    $("hdr-user").style.display = "";
    $("btn-logout").style.display = "";
    $("hdr-hr").style.display = ws.hr_manager ? "" : "none";

    const staffSections = ["me_profile", "me_projects", "me_finance", "me_leave"];
    $("ws-notice").innerHTML = (!ws.bound && ws.allowed.some(k => staffSections.includes(k)))
        ? `<div class="notice">此帳號尚未綁定人員檔案 — 專案／個人資料／工時卡片暫無資料，請管理員在「使用者管理」完成綁定。</div>` : "";

    const grid = $("ws-grid");
    grid.innerHTML = "";
    if (ws.allowed.includes("me_projects")) grid.appendChild(cardProjects(ws.projects || []));
    if (ws.allowed.includes("me_todos"))    grid.appendChild(cardTodos(ws.todos || []));
    if (ws.allowed.includes("me_leave"))    grid.appendChild(cardLeave(ws.leave));
    if (ws.allowed.includes("me_profile"))  grid.appendChild(cardProfile(ws.profile));
    if (ws.allowed.includes("me_finance"))  grid.appendChild(cardFinance(ws.timesheet, ws.payments));
    if (ws.allowed.includes("journal")) {
        // 首次抓一次進 WS.journal 快取；之後 re-render（切待辦/存個資）走快取免重複 GET
        if (WS.journal) grid.appendChild(cardJournal(WS.journal));
        else loadJournalCard(grid);
    }
    if (!ws.allowed.length)
        grid.innerHTML = `<div class="empty">此帳號尚未開通任何工作台功能，請聯絡管理員。</div>`;
}

// ── 卡：每週工作日誌（journal 模組；新註冊預設開通）──
async function loadJournalCard(grid) {
    let r;
    try { r = await mfetch("/api/v1/journal/mine"); } catch (_) { return; }
    if (!r.ok) return;
    WS.journal = await r.json();
    grid.appendChild(cardJournal(WS.journal));
}
// ⚠ jrWeekRange/JR_SECTIONS/jrThisWeek/jrShiftWeek 是 js/shared/journal-core.js
//   （weekRange/BLOCKS/thisWeekStart/shiftWeek）的鏡像（本頁 inline script 非 module
//   不能 import）— 改格式、三問文案或週期算法，兩邊同步
const jrP2 = n => String(n).padStart(2, "0");
const jrISO = d => `${d.getFullYear()}-${jrP2(d.getMonth() + 1)}-${jrP2(d.getDate())}`;
const jrParse = s => { const [y, m, d] = String(s).split("-").map(Number); return new Date(y, m - 1, d); };
function jrThisWeek() {
    const n = new Date(), d = new Date(n.getFullYear(), n.getMonth(), n.getDate());
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7));   // 週一起算
    return jrISO(d);
}
function jrShiftWeek(iso, weeks) { const d = jrParse(iso); d.setDate(d.getDate() + weeks * 7); return jrISO(d); }
function jrWeekRange(ws) {
    const s = jrParse(ws);
    const e = new Date(s); e.setDate(s.getDate() + 6);
    const l = `${s.getFullYear()}/${jrP2(s.getMonth() + 1)}/${jrP2(s.getDate())}`;
    const rr = (s.getFullYear() === e.getFullYear() ? "" : e.getFullYear() + "/")
        + `${jrP2(e.getMonth() + 1)}/${jrP2(e.getDate())}`;
    return `${l} – ${rr}`;
}
const JR_SECTIONS = [["wins", "順利的事與想感謝的人"], ["challenges", "遇到哪些挑戰"], ["learnings", "學到了什麼"]];

// 可切換前後週；能否編輯一律看後端 editable 旗標（規則=當週可編至下一週）
function cardJournal(j) {
    const card = makeCard("Weekly Journal", "工作日誌", "");
    renderJournalBody(card, j);
    return card;
}
function renderJournalBody(card, j) {
    const body = card.querySelector(".card-body");
    const isThis = j.week_start === jrThisWeek();
    const ta = (k) => `<textarea data-jr="${k}" rows="3" ${j.editable ? "" : "disabled"} style="width:100%;border:1px solid var(--line);border-radius:2px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--ink);background:${j.editable ? "#fff" : "#fafafa"};resize:vertical;outline:none;">${esc((j[k] || []).join("\n"))}</textarea>`;
    body.innerHTML = `
        <div class="pf-line" style="align-items:center;gap:8px;">
            <button class="mini-btn jr-nav" data-jr-week="${jrShiftWeek(j.week_start, -1)}" title="上一週" style="padding:2px 9px;">‹</button>
            <span class="k" style="flex:0 0 auto;">${isThis ? "本週" : "週次"}</span>
            <span class="v" style="flex:1;text-align:center;">${jrWeekRange(j.week_start)}</span>
            <button class="mini-btn jr-nav" data-jr-week="${jrShiftWeek(j.week_start, 1)}" title="下一週" style="padding:2px 9px;">›</button>
        </div>
        ${JR_SECTIONS.map(([k, lbl]) => `
            <div class="field" style="margin-top:10px;"><label>${lbl}（一行一條）</label>${ta(k)}</div>`).join("")}
        <div style="padding-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            ${j.editable
                ? `<button class="mini-btn" onclick="saveJournal(this)">儲存${isThis ? "本週" : "這一週"}日誌</button>`
                : `<span style="font-size:12px;color:var(--sub);">僅能編輯至下一週</span>`}
            ${isThis ? "" : `<button class="mini-btn jr-nav" data-jr-week="${jrThisWeek()}">回到本週</button>`}
            <a class="mini-btn" href="/journal.html" style="text-decoration:none;">查看團隊週誌</a>
            <span class="jr-status" style="font-size:12px;color:var(--sub);"></span>
        </div>`;
    body.querySelectorAll(".jr-nav").forEach(b => {
        b.onclick = () => loadJournalWeek(card, b.dataset.jrWeek);
    });
}
async function loadJournalWeek(card, weekStart) {
    const st = card.querySelector(".jr-status");
    if (st) st.textContent = "載入中…";
    let r;
    try { r = await mfetch("/api/v1/journal/mine?start=" + encodeURIComponent(weekStart)); }
    catch (_) { if (st) st.textContent = "連線失敗"; return; }
    if (!r.ok) { if (st) st.textContent = "載入失敗（" + r.status + "）"; return; }
    const d = await r.json();
    if (WS) WS.journal = d;          // 快取＝目前檢視的那一週（re-render 保持同一週）
    renderJournalBody(card, d);
}
async function saveJournal(btn) {
    const card = btn.closest(".card");
    const get = k => (card.querySelector(`textarea[data-jr="${k}"]`).value || "")
        .split("\n").map(s => s.trim()).filter(Boolean);
    const st = card.querySelector(".jr-status");
    const week = (WS && WS.journal && WS.journal.week_start) || jrThisWeek();
    btn.disabled = true;
    try {
        const r = await mfetch("/api/v1/journal/mine?start=" + encodeURIComponent(week), {
            method: "PUT",
            body: JSON.stringify({ wins: get("wins"), challenges: get("challenges"), learnings: get("learnings") }),
        });
        if (r.ok && WS) WS.journal = await r.json();   // 同步快取，re-render 顯示最新
        st.textContent = r.ok ? "已儲存"
            : r.status === 403 ? "已超出可編輯期間（僅能編輯至下一週）"
            : "儲存失敗（" + r.status + "）";
    } catch (_) { st.textContent = "連線失敗"; }
    btn.disabled = false;
    setTimeout(() => { st.textContent = ""; }, 3000);
}

function makeCard(en, zh, countText) {
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<div class="card-head"><span class="eyebrow">${en} <span class="accent">${zh}</span></span>
        ${countText ? `<span class="count">${countText}</span>` : ""}</div><div class="card-body"></div>`;
    return el;
}

// ── 卡 1：我的專案（派工）──
function cardProjects(list) {
    const card = makeCard("My Projects", "我的專案", list.length ? list.length + " 筆" : "");
    const body = card.querySelector(".card-body");
    if (!list.length) { body.innerHTML = `<div class="empty">目前沒有派工紀錄</div>`; return card; }
    body.innerHTML = list.slice(0, 8).map(p => `
        <div class="row">
            <div class="grow">
                <div class="title">${esc(p.project_name || "（未命名專案）")}</div>
                <div class="meta">${esc(p.client_name)}${p.client_name ? " · " : ""}${esc(p.role_in_project)}${p.phase ? " · " + esc(p.phase) : ""}${p.days ? " · " + p.days + " 天" : ""}</div>
            </div>
            <span class="pill${p.project_status === "製作" ? " hot" : ""}">${esc(p.project_status || "—")}</span>
        </div>`).join("")
        + (list.length > 8 ? `<div class="empty" style="padding:10px 0;">…另有 ${list.length - 8} 筆</div>` : "");
    return card;
}

// ── 卡 2：我的待辦（公布欄，own-scope）──
function cardTodos(list) {
    const card = makeCard("My Tasks", "我的待辦", list.length ? list.length + " 項" : "");
    const body = card.querySelector(".card-body");
    if (!list.length) { body.innerHTML = `<div class="empty">沒有待辦事項 🎉</div>`; return card; }
    body.innerHTML = list.map(t => `
        <div class="row" data-todo="${esc(t.id)}">
            <div class="grow">
                <div class="title">${t.pinned ? "📌 " : ""}${esc(t.title)}${t.assigned_to_me ? ' <span class="pill hot" style="margin-left:4px;">指派給我</span>' : ""}</div>
                ${t.note ? `<div class="meta">${esc(t.note)}</div>` : ""}
            </div>
            <button class="mini-btn" onclick="cycleTodo('${esc(t.id)}','${t.status === "todo" ? "doing" : "todo"}')">${t.status === "doing" ? "⏳ 進行中" : "待辦"}</button>
            <button class="mini-btn" onclick="cycleTodo('${esc(t.id)}','done')">✓ 完成</button>
        </div>`).join("");
    return card;
}
async function cycleTodo(id, status) {
    try {
        const r = await mfetch("/api/v1/me/todos/" + id, { method: "PUT", body: JSON.stringify({ status }) });
        if (!r.ok || !WS) return;
        // 本地更新 + 重繪即可，不重抓整包 bundle
        if (status === "done") WS.todos = (WS.todos || []).filter(t => t.id !== id);
        else { const t = (WS.todos || []).find(t => t.id === id); if (t) t.status = status; }
        renderWorkspace();
    } catch (_) {}
}

// ── 卡 3：我的個人資料（白名單欄位可編輯）──
const PF_FIELDS = [
    ["phone", "電話"], ["email", "Email"], ["address", "地址"],
    ["emergency_contact", "緊急聯絡"], ["portfolio_url", "作品集"],
];
function cardProfile(pf) {
    const card = makeCard("My Profile", "個人資料", "");
    const body = card.querySelector(".card-body");
    if (!pf) { body.innerHTML = `<div class="empty">尚未綁定人員檔案</div>`; return card; }
    body.innerHTML = `
        <div class="pf-line"><span class="k">姓名</span><span class="v">${esc(pf.name)}${pf.role ? `　<span class="pill">${esc(pf.role)}</span>` : ""}</span></div>
        ${PF_FIELDS.map(([k, lbl]) => `<div class="pf-line"><span class="k">${lbl}</span><span class="v">${esc(pf[k]) || "<span style='color:#a3a3a3'>—</span>"}</span></div>`).join("")}
        <div class="pf-line"><span class="k">簡介</span><span class="v">${esc(pf.bio) || "<span style='color:#a3a3a3'>—</span>"}</span></div>
        <div style="padding-top:14px;"><button class="mini-btn" onclick="editProfile(this)">✎ 編輯資料</button></div>`;
    return card;
}
function editProfile(btn) {
    const pf = (WS && WS.profile) || {};
    const body = btn.closest(".card").querySelector(".card-body");
    body.innerHTML = `<div class="pf-edit" style="padding-top:10px;">
        ${PF_FIELDS.map(([k, lbl]) => `<div class="field"><label>${lbl}</label><input data-pf="${k}" value="${esc(pf[k])}"></div>`).join("")}
        <div class="field"><label>簡介</label><textarea data-pf="bio" rows="3">${esc(pf.bio)}</textarea></div>
        <div style="display:flex;gap:8px;padding-top:4px;">
            <button class="mini-btn" onclick="saveProfile(this)">儲存</button>
            <button class="mini-btn" onclick="renderWorkspace()">取消</button>
        </div>
        <div class="err" data-pf-err style="margin-top:10px;"></div>
    </div>`;
}
async function saveProfile(btn) {
    const body = btn.closest(".card-body");
    const payload = {};
    body.querySelectorAll("[data-pf]").forEach(el => { payload[el.getAttribute("data-pf")] = el.value; });
    try {
        const r = await mfetch("/api/v1/me/profile", { method: "PUT", body: JSON.stringify(payload) });
        if (!r.ok) {
            const d = await r.json().catch(() => ({}));
            const e = body.querySelector("[data-pf-err]");
            e.textContent = d.detail || "儲存失敗"; e.style.display = "block";
            return;
        }
        // PUT 已回傳最新 profile — 直接更新本地狀態重繪，不重抓 bundle
        const d = await r.json();
        if (WS && d.profile) WS.profile = d.profile;
        renderWorkspace();
    } catch (_) {}
}

// ── 卡：我的請假（me_leave；N-hr H2 自助送單/撤回 + 特休餘額）──
const LEAVE_TYPES = ["特休", "病假", "事假", "公假", "婚假", "喪假", "其他"];
function cardLeave(lv) {
    const card = makeCard("My Leave", "我的請假", "");
    const body = card.querySelector(".card-body");
    if (!lv) { body.innerHTML = `<div class="empty">尚未綁定人員檔案</div>`; return card; }
    const q = lv.quota || {};
    const today = new Date().toISOString().slice(0, 10);
    let html = `<div class="stat-row">
        <div class="stat"><div class="num ${q.remaining < 0 ? "accent" : ""}">${q.remaining ?? "—"}</div><div class="lbl">特休剩餘(天)</div></div>
        <div class="stat"><div class="num">${q.used ?? 0}</div><div class="lbl">已休</div></div>
        <div class="stat"><div class="num">${q.annual ?? "—"}</div><div class="lbl">年度額度</div></div>
    </div>
    <div class="pf-edit" style="border-top:1px solid #f5f5f5;padding-top:12px;padding-bottom:4px;">
        <div class="inline-row" style="margin-bottom:8px;">
            <select id="lv-type">${LEAVE_TYPES.map(t => `<option>${t}</option>`).join("")}</select>
            <input type="number" id="lv-days" value="1" min="0.5" step="0.5" title="天數">
        </div>
        <div class="inline-row" style="margin-bottom:8px;">
            <input type="date" id="lv-start" value="${today}">
            <input type="date" id="lv-end" value="${today}">
        </div>
        <div class="field"><input id="lv-reason" placeholder="事由（選填）"></div>
        <button class="mini-btn" onclick="applyLeave()">送出請假</button>
        <span class="err" id="lv-err" style="margin-left:8px;"></span>
    </div>`;
    html += (lv.recent || []).map(r => `
        <div class="row">
            <div class="grow">
                <div class="title">${esc(r.leave_type)}　${esc(r.start_date)} ~ ${esc(r.end_date)}（${r.days} 天）</div>
                ${r.reason ? `<div class="meta">${esc(r.reason)}</div>` : ""}
            </div>
            <span class="pill${r.status === "待審" ? " hot" : ""}">${esc(r.status)}</span>
            ${r.status === "待審" ? `<button class="mini-btn" onclick="cancelLeave('${esc(r.id)}')">撤回</button>` : ""}
        </div>`).join("");
    body.innerHTML = html;
    return card;
}
async function applyLeave() {
    const errEl = $("lv-err");
    try {
        const r = await mfetch("/api/v1/me/leave", { method: "POST", body: JSON.stringify({
            leave_type: $("lv-type").value, start_date: $("lv-start").value,
            end_date: $("lv-end").value, days: parseFloat($("lv-days").value || "0"),
            reason: $("lv-reason").value,
        }) });
        if (!r.ok) {
            const d = await r.json().catch(() => ({}));
            errEl.textContent = d.detail || "送出失敗"; errEl.style.display = "inline";
            return;
        }
        loadWorkspace();   // 送單改動額度+清單，整包重抓
    } catch (_) { errEl.textContent = "連線失敗"; errEl.style.display = "inline"; }
}
async function cancelLeave(id) {
    try {
        const r = await mfetch("/api/v1/me/leave/" + id, { method: "DELETE" });
        if (r.ok) loadWorkspace();
        else { const d = await r.json().catch(() => ({})); alert(d.detail || "撤回失敗"); }
    } catch (_) {}
}

// ── 卡 4：我的工時＋請款（摘要）──
function cardFinance(ts, pay) {
    const card = makeCard("Hours & Payments", "工時與請款", "");
    const body = card.querySelector(".card-body");
    if (!ts && !pay) { body.innerHTML = `<div class="empty">尚未綁定人員檔案</div>`; return card; }
    let html = "";
    if (ts) {
        html += `<div class="stat-row">
            <div class="stat"><div class="num">${ts.month_hours}<span style="font-size:13px;color:var(--sub)"> h</span></div><div class="lbl">本月工時</div></div>
            <div class="stat"><div class="num">${ts.total_hours}<span style="font-size:13px;color:var(--sub)"> h</span></div><div class="lbl">累計工時</div></div>
            ${pay ? `<div class="stat"><div class="num ${pay.unpaid_count ? "accent" : ""}">${pay.unpaid_count}</div><div class="lbl">未付請款</div></div>` : ""}
        </div>`;
        html += (ts.by_project || []).slice(0, 5).map(p => `
            <div class="row"><div class="grow"><div class="title">${esc(p.project_name)}</div>
            <div class="meta">${p.last_entry ? "最近 " + esc(p.last_entry) : ""}</div></div>
            <span class="pill">${p.hours} h</span></div>`).join("");
    }
    if (pay) {
        if (pay.unpaid_count) html += `<div class="notice" style="margin:14px 0 4px;">未付請款 ${pay.unpaid_count} 筆，合計 <b class="accent">${money(pay.unpaid_amount)}</b></div>`;
        html += (pay.recent || []).map(p => `
            <div class="row"><div class="grow"><div class="title">${esc(p.summary)}</div>
            <div class="meta">${esc(p.date)}${p.project ? " · " + esc(p.project) : ""}</div></div>
            <div style="text-align:right;"><div style="font-size:13px;">${money(p.amount)}</div>
            <span class="pill${p.status !== "已付款" ? " hot" : ""}">${esc(p.status || "—")}</span></div></div>`).join("");
    }
    if (ts) {
        // 補登一筆工時（source=manual；與 Sheet 同步共存，同人同日同案手填優先）
        html += `<div style="padding-top:14px;">
            <button class="mini-btn" onclick="toggleTsForm()">補一筆工時</button>
            <div class="pf-edit" id="ts-form" style="display:none;margin-top:10px;">
                <div class="inline-row" style="margin-bottom:8px;">
                    <input type="date" id="tsf-date" value="${new Date().toISOString().slice(0, 10)}">
                    <input type="number" id="tsf-hours" min="0.1" step="0.1" placeholder="時數">
                </div>
                <div class="field"><select id="tsf-project"><option value="">— 選專案 —</option></select></div>
                <div class="field"><input id="tsf-note" placeholder="工作內容（選填）"></div>
                <button class="mini-btn" onclick="submitTs()">送出</button>
                <span class="err" id="tsf-err" style="margin-left:8px;"></span>
            </div>
        </div>`;
    }
    body.innerHTML = html || `<div class="empty">尚無工時／請款紀錄</div>`;
    return card;
}
async function toggleTsForm() {
    const f = $("ts-form");
    if (!f) return;
    const show = f.style.display === "none";
    f.style.display = show ? "" : "none";
    const sel = $("tsf-project");
    if (show && sel && sel.options.length <= 1) {
        try {
            const r = await mfetch("/api/v1/me/timesheet_options");
            if (r.ok) {
                const d = await r.json();
                (d.projects || []).forEach(p => {
                    const o = document.createElement("option");
                    o.value = p.name; o.textContent = p.name;
                    sel.appendChild(o);
                });
            }
        } catch (_) {}
    }
}
async function submitTs() {
    const errEl = $("tsf-err");
    try {
        const r = await mfetch("/api/v1/me/timesheets", { method: "POST", body: JSON.stringify({
            work_date: $("tsf-date").value, project_name: $("tsf-project").value,
            task_note: $("tsf-note").value, hours: parseFloat($("tsf-hours").value || "0"),
        }) });
        if (!r.ok) {
            const d = await r.json().catch(() => ({}));
            errEl.textContent = d.detail || "送出失敗"; errEl.style.display = "inline";
            return;
        }
        loadWorkspace();   // 時數統計要重算，整包重抓
    } catch (_) { errEl.textContent = "連線失敗"; errEl.style.display = "inline"; }
}
