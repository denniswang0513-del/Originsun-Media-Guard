<h2 class="text-lg font-semibold mb-4 text-[#e0e0e0] border-b border-[#3a3a3a] pb-2">製作串帶</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Left: Source + Destination -->
    <div class="space-y-4">
        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="block text-sm font-medium text-gray-400">碎片影片來源 (依檔序排列)</label>
                <div class="flex gap-1">
                    <button onclick="ccAddFiles()"
                        class="text-xs bg-[#1f538d] hover:bg-[#2a6cbf] px-2 py-1 rounded text-white border border-[#2a6cbf]">📄 新增檔案（可多選）</button>
                    <button onclick="ccAddFolder()"
                        class="text-xs bg-[#1f538d] hover:bg-[#2a6cbf] px-2 py-1 rounded text-white border border-[#2a6cbf]">📁 新增資料夾</button>
                    <button onclick="addStandaloneSource('cc_source_list')"
                        class="text-xs bg-[#333] hover:bg-[#444] px-2 py-1 rounded text-white border border-[#555]">+ 空白列</button>
                </div>
            </div>
            <div id="cc_source_list"
                class="space-y-2 bg-[#1e1e1e] border border-[#444] rounded p-2 min-h-[120px] max-h-[600px] overflow-y-auto"
                style="resize: vertical;">
                <!-- JS Generated -->
            </div>
            <div class="mt-2 flex items-center gap-3">
                <button onclick="ccScanSources()"
                    class="text-xs bg-[#1f538d] hover:bg-[#2a6cbf] px-3 py-1.5 rounded text-white border border-[#2a6cbf]">🔍 掃描顯示縮圖</button>
                <button onclick="openConcatEditor()"
                    class="text-xs bg-[#6b3fa0] hover:bg-[#8254c0] px-3 py-1.5 rounded text-white border border-[#8254c0]">🎬 進階編輯...</button>
                <span id="cc_editor_status" class="text-xs text-gray-500">尚未套用進階編輯</span>
                <button onclick="clearConcatAdvanced()" id="cc_clear_advanced" class="text-xs text-red-400 hover:text-red-300 ml-auto hidden">清除進階設定</button>
            </div>

            <!-- Scan progress + thumbnail grid -->
            <div id="cc-scan-progress" class="hidden mt-3 mb-2">
                <div class="flex justify-between text-xs text-gray-400 mb-1">
                    <span id="cc-scan-label">掃描中...</span>
                    <span id="cc-scan-count">0 / 0</span>
                </div>
                <div class="w-full bg-[#1e1e1e] rounded-full h-3 border border-[#444] overflow-hidden">
                    <div id="cc-scan-bar" class="h-3 bg-blue-500 transition-all duration-200" style="width:0%"></div>
                </div>
            </div>
            <div id="cc_grid_toolbar" class="hidden flex items-center gap-3 mt-3 mb-2 text-xs text-gray-400">
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" id="cc_select_all" checked onchange="ccToggleSelectAll(this.checked)"
                        class="form-checkbox text-blue-500 bg-[#1e1e1e] border-[#444] rounded">
                    全選
                </label>
                <span class="text-gray-600">|</span>
                <span>拖曳卡片可調整排列順序</span>
                <span id="cc_select_count" class="ml-auto text-gray-500"></span>
                <button onclick="ccClearScan()" class="text-red-400 hover:text-red-300">清空</button>
            </div>
            <div id="cc_file_grid"
                class="grid gap-3 hidden"
                style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">目標輸出資料夾</label>
            <div class="flex gap-2">
                <input type="text" id="cc_dest"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
                    value="C:/A_TEST_REEL">
                <button onclick="pickPath('cc_dest', 'folder')"
                    class="bg-[#333] hover:bg-[#444] px-3 rounded border border-[#555] text-gray-300">📁</button>
            </div>
        </div>
    </div>
    <!-- Right: Options + Host selector -->
    <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">解析度 (Resolution)</label>
                <select id="cc_res"
                    class="w-full bg-[#1e1e1e] text-sm border border-[#444] rounded px-3 py-2 focus:outline-none focus:border-blue-500">
                    <option value="1080P">高度 1080 (HD)</option>
                    <option value="720P">高度 720 (SD)</option>
                    <option value="Ultra HD">高度 2160 (4K)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">編解碼格式 (Codec)</label>
                <select id="cc_codec"
                    class="w-full bg-[#1e1e1e] text-sm border border-[#444] rounded px-3 py-2 focus:outline-none focus:border-blue-500">
                    <option value="ProRes">ProRes 422 (速度慢/剪接用)</option>
                    <option value="H.264 (NVENC)" selected>H.264 NVENC (NVIDIA硬解/速度極快)</option>
                    <option value="H.264 (軟體)">H.264 x264 (軟體編碼/兼容佳)</option>
                </select>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">畫面浮水印附加 (Overlays)</label>
            <div class="flex flex-col gap-2">
                <label class="flex items-center gap-2 cursor-pointer text-sm">
                    <input type="checkbox" id="cc_burn_timecode"
                        class="form-checkbox text-blue-500 bg-[#1e1e1e] border-[#444] rounded">
                    <span class="text-gray-300">壓印時間碼 (Timecode 右上)</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-sm">
                    <input type="checkbox" id="cc_burn_filename" checked
                        class="form-checkbox text-blue-500 bg-[#1e1e1e] border-[#444] rounded">
                    <span class="text-gray-300">壓印原始檔名 (Filename 左下)</span>
                </label>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">自訂檔頭名 (留白自動抓資料夾名)</label>
            <input type="text" id="cc_name"
                class="w-full bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
                placeholder="例如: RAW_Reel_1">
        </div>
        <div id="cc_host_panel" class="hidden p-3 bg-[#1a2a3a] border border-[#2e4a6e] rounded-lg">
            <div class="text-xs text-blue-300 font-semibold mb-2">處理主機</div>
            <div id="cc_host_checkboxes" class="flex flex-wrap gap-x-4 gap-y-1"></div>
        </div>
    </div>
</div>
<div class="mt-6 border-t border-[#3a3a3a] pt-4">
<div class="flex justify-between items-center" id="ct-action-bar">
    <div class="flex gap-2 tab-control-btns hidden">
        <button onclick="apiControl('pause')" class="bg-[#7a5500] hover:bg-[#b07a00] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">暫停</button>
        <button onclick="apiControl('resume')" class="bg-[#3a5a3a] hover:bg-[#4a7a4a] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">繼續</button>
        <button onclick="apiControl('stop')" class="bg-[#8b0000] hover:bg-[#cc2200] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">強制中止</button>
    </div>
    <div class="flex gap-3 ml-auto">
        <button onclick="scheduleJob('concat')" class="bg-[#333] hover:bg-[#444] text-gray-300 font-bold py-2 px-6 rounded shadow text-sm transition-colors border border-[#555]">排程</button>
        <button class="tab-start-btn bg-[#228b22] hover:bg-[#2eaa2e] text-white font-bold py-2 px-8 rounded shadow text-sm transition-colors"
            onclick="submitConcat()" data-idle-text="開始" data-busy-text="開始新佇列">開始</button>
    </div>
</div>

<!-- Progress Bar -->
<div id="ct-progress" class="mt-4 mb-2 hidden">
    <div class="flex justify-between text-xs text-gray-400 mb-1">
        <span id="ct-prog-label">進度：尚未開始</span>
        <span id="ct-prog-eta"></span>
    </div>
    <div class="relative w-full bg-[#1e1e1e] rounded-full h-4 border border-[#444] overflow-hidden">
        <div id="ct-prog-bar" class="h-4 transition-all duration-300" style="width: 0%; background-color: #228b22;"></div>
    </div>
    <div class="text-xs text-gray-500 mt-1"><span id="ct-prog-detail"></span></div>
</div>

<!-- 遠端主機進度 -->
<div id="ct-remote-hosts-progress" class="hidden mt-4 mb-2 p-3 bg-[#1a1a2e] border border-[#2e3a6e] rounded-lg">
    <div class="text-xs text-blue-400 font-semibold mb-2">🖥️ 遠端主機串接進度</div>
    <div id="ct-remote-host-rows" class="flex flex-col gap-2"></div>
</div>
</div>
