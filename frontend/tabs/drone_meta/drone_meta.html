<h2 class="text-lg font-semibold mb-4 text-[#e0e0e0] border-b border-[#3a3a3a] pb-2">空拍轉換</h2>

<!-- ═══ 區塊一：檔案選擇 + 預覽列表 ═══ -->
<div class="mb-6">
    <div class="flex items-center gap-3 mb-3">
        <label class="text-sm font-medium text-gray-400">影片來源</label>
        <button onclick="dmPickFolder()"
            class="text-xs bg-[#333] hover:bg-[#444] px-3 py-1.5 rounded text-white border border-[#555]">📁 選擇資料夾</button>
        <button onclick="dmPickFiles()"
            class="text-xs bg-[#333] hover:bg-[#444] px-3 py-1.5 rounded text-white border border-[#555]">📄 選擇檔案</button>
        <button onclick="dmScanFiles()"
            class="text-xs bg-[#2a5a9e] hover:bg-[#3a6abe] px-3 py-1.5 rounded text-white border border-[#4a7ace]">🔍 掃描影片</button>
        <span id="dm_scan_status" class="text-xs text-gray-500"></span>
    </div>

    <!-- 手動路徑輸入 -->
    <div class="flex gap-2 mb-3">
        <input type="text" id="dm_source_path"
            class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
            placeholder="輸入資料夾或檔案路徑，可用逗號分隔多個路徑...">
    </div>

    <!-- 全選/勾選統計 -->
    <div id="dm_file_toolbar" class="hidden flex items-center gap-4 mb-2">
        <label class="flex items-center gap-2 cursor-pointer text-sm">
            <input type="checkbox" id="dm_select_all" onchange="dmToggleSelectAll(this.checked)"
                class="form-checkbox text-blue-500 bg-[#1e1e1e] border-[#444] rounded">
            <span class="text-gray-300">全選</span>
        </label>
        <span id="dm_select_count" class="text-xs text-gray-500">已勾選 0 個</span>
        <button onclick="dmClearFiles()" class="text-xs text-red-400 hover:text-red-300 ml-auto">清空列表</button>
    </div>

    <!-- 批次時間工具 -->
    <div id="dm_time_toolbar" class="hidden flex items-center gap-3 mb-2 p-2 bg-[#1a1a1a] border border-[#333] rounded">
        <label class="text-xs text-gray-400">批次時間：</label>
        <input type="date" id="dm_batch_date" class="bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs">
        <input type="time" id="dm_batch_time" step="1" class="bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs">
        <button onclick="dmBatchApplyTime()" class="text-xs bg-[#2a5a9e] hover:bg-[#3a6abe] px-3 py-1 rounded text-white">套用到已勾選</button>
        <span class="text-xs text-gray-500">|</span>
        <label class="text-xs text-gray-400">遞增</label>
        <input type="number" id="dm_batch_increment" value="1" min="1" max="60" class="w-12 bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs text-center">
        <label class="text-xs text-gray-400">分鐘</label>
        <button onclick="dmBatchIncrementTime()" class="text-xs bg-[#333] hover:bg-[#444] px-3 py-1 rounded text-white border border-[#555]">依序遞增</button>
    </div>

    <!-- 檔案卡片列表 -->
    <div id="dm_file_list"
        class="space-y-1 bg-[#1e1e1e] border border-[#444] rounded p-2 min-h-[60px] max-h-[500px] overflow-y-auto"
        style="resize: vertical;">
        <div class="text-sm text-gray-500 text-center py-4">尚未掃描影片，請先選擇來源並點擊「掃描影片」</div>
    </div>
</div>

<!-- ═══ 區塊二：轉換設定 ═══ -->
<div class="mb-6">
    <h3 class="text-sm font-semibold text-[#c0c0c0] mb-3 border-b border-[#333] pb-1">轉換設定</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
            <label class="block text-xs text-gray-400 mb-1">檔案起始編號</label>
            <input type="number" id="dm_file_index" value="1" min="1"
                class="w-full bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
        </div>
        <div>
            <label class="block text-xs text-gray-400 mb-1">輸出機型</label>
            <select id="dm_drone_model"
                onchange="dmOnModelChange()"
                class="w-full bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                <option value="autel_evo_lite_plus">Autel Robotics EVO Lite+</option>
                <option value="dji_mavic3">DJI Mavic 3</option>
                <option value="dji_mini4pro">DJI Mini 4 Pro</option>
                <option value="dji_air3">DJI Air 3</option>
                <option value="custom">自訂...</option>
            </select>
            <div id="dm_custom_model_fields" class="hidden mt-2 grid grid-cols-2 gap-2">
                <input type="text" id="dm_custom_make" placeholder="Make (如: DJI)"
                    class="bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs">
                <input type="text" id="dm_custom_model" placeholder="Model (如: Mavic 3)"
                    class="bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs">
                <input type="text" id="dm_custom_lens_make" placeholder="Lens Make"
                    class="bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs">
                <input type="text" id="dm_custom_lens_model" placeholder="Lens Model"
                    class="bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs">
            </div>
        </div>
        <div>
            <label class="block text-xs text-gray-400 mb-1">輸出目錄（留空 = 來源同目錄）</label>
            <div class="flex gap-2">
                <input type="text" id="dm_output_dir"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
                    placeholder="留空則輸出至來源同目錄">
                <button onclick="pickPath('dm_output_dir', 'folder')"
                    class="bg-[#333] hover:bg-[#444] px-3 rounded border border-[#555] text-gray-300">📁</button>
            </div>
        </div>
    </div>
</div>

<!-- ═══ 區塊三：串帶選項 ═══ -->
<div class="mb-6">
    <label class="flex items-center gap-2 cursor-pointer text-sm mb-2">
        <input type="checkbox" id="dm_do_concat" onchange="dmToggleConcat()"
            class="form-checkbox text-blue-500 bg-[#1e1e1e] border-[#444] rounded">
        <span class="text-gray-300 font-medium">寫入後串帶已勾選的影片</span>
    </label>
    <div id="dm_concat_options" class="hidden ml-6 p-3 bg-[#1a2a2a] border border-[#2a4a4a] rounded space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs text-gray-400 mb-1">串帶輸出目錄</label>
                <div class="flex gap-2">
                    <input type="text" id="dm_concat_dest"
                        class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                    <button onclick="pickPath('dm_concat_dest', 'folder')"
                        class="bg-[#333] hover:bg-[#444] px-2 rounded border border-[#555] text-gray-300 text-sm">📁</button>
                </div>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">解析度</label>
                <select id="dm_concat_res"
                    class="w-full bg-[#1e1e1e] border border-[#444] rounded px-2 py-1.5 text-sm">
                    <option value="1080P" selected>1080P</option>
                    <option value="720P">720P</option>
                    <option value="Ultra HD">4K (Ultra HD)</option>
                </select>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs text-gray-400 mb-1">編碼格式</label>
                <select id="dm_concat_codec"
                    class="w-full bg-[#1e1e1e] border border-[#444] rounded px-2 py-1.5 text-sm">
                    <option value="H.264 (NVENC)" selected>H.264 NVENC</option>
                    <option value="H.264 (軟體)">H.264 x264</option>
                    <option value="ProRes">ProRes 422</option>
                </select>
            </div>
            <div class="flex flex-col gap-1 pt-5">
                <label class="flex items-center gap-2 cursor-pointer text-xs">
                    <input type="checkbox" id="dm_concat_tc" checked class="form-checkbox text-blue-500 bg-[#1e1e1e] border-[#444] rounded">
                    <span class="text-gray-300">壓印 Timecode</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-xs">
                    <input type="checkbox" id="dm_concat_fn" class="form-checkbox text-blue-500 bg-[#1e1e1e] border-[#444] rounded">
                    <span class="text-gray-300">壓印原始檔名</span>
                </label>
            </div>
        </div>
    </div>
</div>

<!-- ═══ 區塊四：動作按鈕 + 進度 ═══ -->
<div class="border-t border-[#3a3a3a] pt-4">
    <div class="flex justify-between items-center">
        <div class="flex gap-2 dm-control-btns hidden">
            <button onclick="dmApiControl('pause')" class="bg-[#7a5500] hover:bg-[#b07a00] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">暫停</button>
            <button onclick="dmApiControl('resume')" class="bg-[#3a5a3a] hover:bg-[#4a7a4a] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">繼續</button>
            <button onclick="dmApiControl('stop')" class="bg-[#8b0000] hover:bg-[#cc2200] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">強制中止</button>
        </div>
        <div class="flex gap-3 ml-auto">
            <button class="dm-start-btn bg-[#228b22] hover:bg-[#2eaa2e] text-white font-bold py-2 px-8 rounded shadow text-sm transition-colors"
                onclick="submitDroneMeta()" data-idle-text="開始執行" data-busy-text="佇列中">開始執行</button>
        </div>
    </div>

    <!-- 進度條 -->
    <div id="dm-progress" class="mt-4 mb-2 hidden">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span id="dm-prog-label">進度：尚未開始</span>
            <span id="dm-prog-eta"></span>
        </div>
        <div class="relative w-full bg-[#1e1e1e] rounded-full h-4 border border-[#444] overflow-hidden">
            <div id="dm-prog-bar" class="h-4 transition-all duration-300" style="width: 0%; background-color: #228b22;"></div>
        </div>
        <div class="text-xs text-gray-500 mt-1"><span id="dm-prog-detail"></span></div>
    </div>
</div>
