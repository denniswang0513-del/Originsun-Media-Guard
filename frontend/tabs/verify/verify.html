<h2 class="text-lg font-semibold mb-4 text-[#e0e0e0] border-b border-[#3a3a3a] pb-2">檔案比對</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Left: Targets -->
    <div class="space-y-4">
        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="block text-sm font-medium text-gray-400">來源清單 (Source)</label>
                <button onclick="addVerifySourceRow()"
                    class="text-xs bg-[#333] hover:bg-[#444] px-2 py-1 rounded text-white border border-[#555]">+
                    新增來源</button>
            </div>
            <div id="vf_source_list"
                class="space-y-2 bg-[#1e1e1e] border border-[#444] rounded p-2 min-h-[120px] max-h-[600px] overflow-y-auto transition-colors duration-200"
                style="resize: vertical;">
                <!-- JS Generated -->
            </div>
        </div>
    </div>
    <!-- Right: Options -->
    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">比對模式</label>
            <div class="flex gap-4">
                <label class="flex items-center gap-2 cursor-pointer text-sm">
                    <input type="radio" name="vf_mode" value="quick" checked
                        class="form-radio text-blue-500 bg-[#1e1e1e] border-[#444]">
                    <span>快速 (僅比對檔名與大小)</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-sm">
                    <input type="radio" name="vf_mode" value="xxh64"
                        class="form-radio text-blue-500 bg-[#1e1e1e] border-[#444]">
                    <span>進階 (XXH64 雜湊值)</span>
                </label>
            </div>
        </div>
        <p class="text-sm text-gray-400 leading-relaxed">
            獨立標籤頁專為比對已存在的檔案庫設計。<br><br>
            請在左側的清單中，為每一組來源對應一個目標資料夾（左側填來源，右側填目標）。系統會依照您的選擇產出完整的比對報告。
        </p>
        <div id="vf_host_panel" class="hidden p-3 bg-[#1a2a3a] border border-[#2e4a6e] rounded-lg">
            <div class="text-xs text-blue-300 font-semibold mb-2">處理主機</div>
            <div id="vf_host_checkboxes" class="flex flex-wrap gap-x-4 gap-y-1"></div>
        </div>
    </div>
</div>
<div class="mt-6 flex justify-end gap-3 pt-4 border-t border-[#3a3a3a]">
    <button onclick="scheduleJob('verify')"
        class="bg-[#333] hover:bg-[#444] text-gray-300 font-bold py-2 px-6 rounded shadow text-sm transition-colors border border-[#555]">
        排程
    </button>
    <button onclick="submitVerify()"
        class="bg-[#555555] hover:bg-[#666666] text-white font-bold py-2 px-8 rounded shadow text-sm transition-colors">
        開始比對
    </button>
</div>

<!-- Progress Bar -->
<div id="vf-progress" class="mt-4 mb-2 hidden">
    <div class="flex justify-between text-xs text-gray-400 mb-1">
        <span id="vf-prog-label">進度：尚未開始</span>
        <span id="vf-prog-eta"></span>
    </div>
    <div class="relative w-full bg-[#1e1e1e] rounded-full h-4 border border-[#444] overflow-hidden">
        <div id="vf-prog-bar" class="h-4 transition-all duration-300" style="width: 0%; background-color: #0d9488;"></div>
    </div>
    <div class="text-xs text-gray-500 mt-1"><span id="vf-prog-detail"></span></div>
</div>
<div id="vf-remote-hosts-progress" class="hidden mt-2 mb-2 p-3 bg-[#1a1a2e] border border-[#2e3a6e] rounded-lg">
    <div class="text-xs text-blue-300 mb-2 font-semibold">🖥️ 遠端主機進度</div>
    <div id="vf-remote-host-rows" class="flex flex-col gap-2"></div>
</div>
