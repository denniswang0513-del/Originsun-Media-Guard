<!--
    website.html — 官網管理 Tab 主殼
    左側 9 子視圖導覽 + 右側內容容器。子視圖用 lazy dynamic import。
-->
<div id="website-root" style="display:flex;height:calc(100vh - 180px);min-height:500px;background:#1a1a1a;">

    <!-- 左側導覽 -->
    <nav id="website-nav" style="width:200px;border-right:1px solid #2a2a2a;padding:16px 0;flex-shrink:0;overflow-y:auto;min-height:0;">
        <div style="padding:0 16px 12px;font-size:11px;color:#666;letter-spacing:0.08em;">官網管理</div>
        <!-- 常用（置頂快速入口）：最常看的儀表板 + 社群工作台 -->
        <div style="padding:4px 16px;font-size:10px;color:#555;letter-spacing:0.1em;">⚡ 常用</div>
        <button class="website-nav-btn active" data-subview="dashboard">📊 儀表板</button>
        <button class="website-nav-btn" data-subview="social">📣 社群工作台</button>

        <!-- 官網欄目：一一對應官網導覽列（首頁/作品集/歷年作品/服務項目/關於我們/部落格/聯絡）順序 -->
        <div style="padding:14px 16px 4px;font-size:10px;color:#555;letter-spacing:0.1em;">📄 官網欄目</div>
        <button class="website-nav-btn" data-subview="home">🏠 首頁</button>
        <button class="website-nav-btn" data-subview="works">🎬 作品集</button>
        <button class="website-nav-btn" data-subview="awards">🏆 歷年作品（獎項）</button>
        <button class="website-nav-btn" data-subview="services">🧩 服務項目</button>
        <button class="website-nav-btn" data-subview="about">👥 關於我們</button>
        <button class="website-nav-btn" data-subview="initiatives">🤝 公益 & 創作</button>
        <button class="website-nav-btn" data-subview="blog">📝 部落格</button>
        <button class="website-nav-btn" data-subview="inquiries">📬 聯絡 <span id="website-inq-badge" class="website-badge" style="display:none;"></span></button>

        <!-- 網站工具：非導覽欄目（全站性 / 支援功能）— 可收合，狀態記 localStorage -->
        <div id="website-tools-toggle" style="padding:14px 16px 4px;font-size:10px;color:#888;letter-spacing:0.1em;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;">
            <span>🛠️ 網站工具</span><span id="website-tools-arrow" style="font-size:11px;">▸</span>
        </div>
        <div id="website-tools-group" style="display:none;">
            <button class="website-nav-btn" data-subview="categories">🏷️ 作品分類</button>
            <button class="website-nav-btn" data-subview="credits">🎭 演職員</button>
            <button class="website-nav-btn" data-subview="seo">🔍 SEO / AI SEO</button>
            <button class="website-nav-btn" data-subview="translation">🌐 英文翻譯</button>
            <button class="website-nav-btn" data-subview="redirects">🔀 轉址 (301)</button>
            <button class="website-nav-btn" data-subview="nav">🧭 導覽選單</button>
            <button class="website-nav-btn" data-subview="settings">⚙️ 網站設定</button>
            <button class="website-nav-btn" data-subview="backup">🗄 資料備份</button>
        </div>

        <div style="padding:16px;margin-top:20px;font-size:11px;color:#555;border-top:1px solid #2a2a2a;">
            <div style="margin-bottom:6px;">API: <span id="website-api-base-display"></span></div>
            <div>狀態: <span id="website-api-health" style="color:#888;">檢查中…</span></div>
        </div>
    </nav>

    <!-- 右側內容區（子視圖載入進這裡）-->
    <main id="website-content" style="flex:1;padding:24px;overflow:auto;">
        <div id="website-loading" style="color:#888;padding:40px;text-align:center;">載入中…</div>
    </main>
</div>

<style>
    /* .website-nav-btn base/hover/active styles live in global style.css,
       shared with .group-side-btn (the grouped-nav sidebar). */
    /* 左側導覽過長時可捲動；細捲軸配深色主題 */
    #website-nav{scrollbar-width:thin;scrollbar-color:#3a3a3a transparent;}
    #website-nav::-webkit-scrollbar{width:8px;}
    #website-nav::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:4px;}
    #website-nav::-webkit-scrollbar-thumb:hover{background:#4a4a4a;}
    #website-nav::-webkit-scrollbar-track{background:transparent;}
    .website-badge {
        display: inline-block; background: #dc2626; color: #fff;
        font-size: 10px; padding: 1px 6px; border-radius: 8px;
        margin-left: 6px; font-weight: 600;
    }
    #website-content h2 {
        color: #fff; font-size: 18px; margin: 0 0 16px 0; font-weight: 600;
    }
    #website-content .card {
        background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px;
        padding: 16px; margin-bottom: 12px;
    }
    #website-content .btn {
        background: #3b82f6; color: #fff; border: none; padding: 6px 12px;
        border-radius: 4px; font-size: 12px; cursor: pointer;
    }
    #website-content .btn:hover { background: #2563eb; }
    #website-content .btn.btn-sm { padding: 4px 8px; font-size: 11px; }
    #website-content .btn.btn-danger { background: #dc2626; }
    #website-content .btn.btn-danger:hover { background: #b91c1c; }
    #website-content .btn.btn-ghost { background: transparent; border: 1px solid #444; color: #ccc; }
    #website-content .btn.btn-ghost:hover { background: #333; }
    #website-content input, #website-content textarea, #website-content select {
        background: #1a1a1a; border: 1px solid #3a3a3a; color: #fff;
        padding: 6px 10px; border-radius: 4px; font-size: 13px;
    }
    #website-content table { width: 100%; border-collapse: collapse; font-size: 13px; }
    #website-content th, #website-content td {
        padding: 8px 12px; border-bottom: 1px solid #2a2a2a; text-align: left; color: #ddd;
    }
    #website-content th { color: #888; font-weight: 500; font-size: 11px; letter-spacing: 0.05em; }
    #website-content tr:hover td { background: #252525; }
    .website-pill {
        display: inline-block; padding: 2px 8px; border-radius: 10px;
        font-size: 11px; background: #333; color: #ccc;
    }
    .website-pill.status-new      { background: #1e3a5f; color: #8bb8e8; }
    .website-pill.status-in_progress { background: #5f3f1e; color: #e8b08b; }
    .website-pill.status-converted { background: #1e5f2e; color: #8be8a5; }
    .website-pill.status-spam     { background: #5f1e1e; color: #e88b8b; }
</style>
