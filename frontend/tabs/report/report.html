<h2 class="text-lg font-semibold mb-4 text-[#e0e0e0] border-b border-[#3a3a3a] pb-2">NAS 專案檔案報表</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
    <!-- Left: Source & Output -->
    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">來源資料夾 (Scan Source)</label>
            <div class="flex gap-2">
                <input type="text" id="rpt_source"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-purple-500"
                    placeholder="選擇包含影片的資料夾...">
                <button onclick="pickPath('rpt_source', 'folder')"
                    class="bg-[#333] hover:bg-[#444] px-3 rounded border border-[#555] text-gray-300">📁</button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">報表輸出資料夾 (Output Directory)</label>
            <div class="flex gap-2">
                <input type="text" id="rpt_output"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-purple-500"
                    value="\\192.168.1.132\Container\AI_Workspace\Originsun_Web\FileReport"
                    placeholder="HTML 報表儲存位置...">
                <button onclick="pickPath('rpt_output', 'folder')"
                    class="bg-[#333] hover:bg-[#444] px-3 rounded border border-[#555] text-gray-300">📁</button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">報表名稱 (Report Name)</label>
            <input type="text" id="rpt_report_name"
                class="w-full bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-purple-500"
                placeholder="例：20260303_Report">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">異地備份資訊 (NAS Root 可選填)</label>
            <div class="flex gap-2">
                <input type="text" id="rpt_nas_root"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-purple-500"
                    placeholder="NAS 目的地的根路徑（僅供顯示於報表）">
                <button onclick="pickPath('rpt_nas_root', 'folder')"
                    class="bg-[#333] hover:bg-[#444] px-3 rounded border border-[#555] text-gray-300">📁</button>
            </div>
        </div>

        <!-- Report Content Options -->
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">報表內容</label>
            <div class="bg-[#1e1e1e] border border-[#3a3a3a] rounded p-3">
                <div class="space-y-2 text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="rpt_filmstrip" checked
                            class="form-checkbox text-purple-500 rounded bg-[#1e1e1e] border-[#444]">
                        <span>🎬 包含膠卷縮圖 (15 幀)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="rpt_techspec" checked
                            class="form-checkbox text-blue-500 rounded bg-[#1e1e1e] border-[#444]">
                        <span>📹 包含技術規格 (時間 / FPS / 解析度 / 編碼)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="rpt_hash"
                            class="form-checkbox text-purple-500 rounded bg-[#1e1e1e] border-[#444]">
                        <span>🔐 對每個檔案計算 XXH64 校驗碼 (較慢)</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Right: Report History + Submit -->
    <div class="space-y-4 flex flex-col h-full">
        <div class="flex-1 flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-sm font-semibold text-gray-300">📜 報表歷史紀錄 (NAS 全域索引)</h3>
                <button onclick="loadReportHistory()" class="text-xs bg-[#333] hover:bg-[#444] text-white py-1 px-3 rounded border border-[#555] transition-colors">
                    🔄 重新載入
                </button>
            </div>
            <div id="rpt_history_list" class="bg-[#1e1e1e] border border-[#3a3a3a] rounded-lg flex-1 min-h-[150px] max-h-[220px] overflow-y-auto shadow-inner">
                <div class="px-4 py-8 text-center text-xs text-gray-500 flex items-center justify-center h-full">NAS 尚無歷史報表紀錄</div>
            </div>
        </div>
        <div id="rpt_host_panel" class="hidden p-3 bg-[#1a2a3a] border border-[#2e4a6e] rounded-lg">
            <div class="text-xs text-blue-300 font-semibold mb-2">處理主機</div>
            <div id="rpt_host_checkboxes" class="flex flex-wrap gap-x-4 gap-y-1"></div>
        </div>

    </div>
</div>

<div class="mt-6 border-t border-[#3a3a3a] pt-4">
<!-- Action Bar -->
<div class="flex justify-between items-center" id="rp-action-bar">
    <div class="flex gap-2 tab-control-btns hidden">
        <button onclick="apiControl('pause')" class="bg-[#7a5500] hover:bg-[#b07a00] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">暫停</button>
        <button onclick="apiControl('resume')" class="bg-[#3a5a3a] hover:bg-[#4a7a4a] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">繼續</button>
        <button onclick="apiControl('stop')" class="bg-[#8b0000] hover:bg-[#cc2200] text-white text-xs font-bold py-2 px-4 rounded shadow transition-colors">強制中止</button>
    </div>
    <div class="flex gap-3 ml-auto">
        <button onclick="scheduleJob('report')" class="bg-[#333] hover:bg-[#444] text-gray-300 font-bold py-2 px-6 rounded shadow text-sm transition-colors border border-[#555]">排程</button>
        <button class="tab-start-btn bg-[#5b21b6] hover:bg-[#7c3aed] text-white font-bold py-2 px-8 rounded shadow text-sm transition-colors"
            onclick="submitReportJob()" data-idle-text="開始" data-busy-text="開始新佇列">開始</button>
    </div>
</div>

<!-- Progress Bar (四段式：掃描/Meta/膠卷/報表輸出) -->
<div id="rp-progress" class="mt-4 mb-2 hidden">
    <div class="flex justify-between text-xs text-gray-400 mb-1">
        <span id="rp-prog-label">備用中...</span>
        <span id="rp-prog-eta"></span>
    </div>
    <div class="relative w-full bg-[#1e1e1e] rounded-full h-4 border border-[#444] overflow-hidden flex">
        <div id="rp-seg-scan" class="h-4 transition-all duration-300 shrink-0" style="width:0%; background:#1f538d"></div>
        <div id="rp-seg-meta" class="h-4 transition-all duration-300 shrink-0" style="width:0%; background:#d48a04"></div>
        <div id="rp-seg-strip" class="h-4 transition-all duration-300 shrink-0" style="width:0%; background:#228b22"></div>
        <div id="rp-seg-render" class="h-4 transition-all duration-300 shrink-0" style="width:0%; background:#7c3aed"></div>
    </div>
    <div class="flex gap-4 mt-1 text-xs text-gray-500 flex-wrap">
        <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#1f538d"></span>[掃描] <span id="rp-lbl-scan">0%</span></span>
        <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#d48a04"></span>[Meta/Hash] <span id="rp-lbl-meta">0%</span></span>
        <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#228b22"></span>[膠卷生成] <span id="rp-lbl-strip">0%</span></span>
        <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#7c3aed"></span>[報表輸出] <span id="rp-lbl-render">0%</span></span>
    </div>
</div>

<div id="rp-remote-hosts-progress" class="hidden mt-2 mb-2 p-3 bg-[#1a1a2e] border border-[#2e3a6e] rounded-lg">
    <div class="text-xs text-blue-300 mb-2 font-semibold">🖥️ 遠端主機進度</div>
    <div id="rp-remote-host-rows" class="flex flex-col gap-2"></div>
</div>
</div>
