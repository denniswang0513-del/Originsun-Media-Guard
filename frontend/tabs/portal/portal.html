<!--
    portal.html — 🎬 審批門戶 Tab 殼（B1 看片審批客戶門戶，docs/BIZ_PLAN.md B1 段）
    內容全部由 portal.js render 進 #portal-content（同源打 /api/v1/portal/*）。
    建送審連結（專案+版本+影片路徑）→ 產 token → 客戶 /review.html?token= 看片
    留言核准；此 Tab 管連結列表 + 意見 resolve + 狀態流轉。
-->
<div id="portal-root">
    <div id="portal-content" style="color:#888;padding:40px;text-align:center;">載入中…</div>
</div>
