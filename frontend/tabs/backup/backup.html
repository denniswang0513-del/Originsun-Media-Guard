<h2 class="text-lg font-semibold mb-4 text-[#e0e0e0] border-b border-[#3a3a3a] pb-2">備份並轉檔</h2>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Left: Sources + Paths -->
    <div class="space-y-3">
        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="block text-sm font-medium text-gray-400">檔案來源 (Source Directories)</label>
                <button onclick="addSourceRow()"
                    class="text-xs bg-[#333] hover:bg-[#444] px-2 py-1 rounded text-white border border-[#555]">+ 新增來源</button>
            </div>
            <div id="source_list"
                class="space-y-2 bg-[#1e1e1e] border border-[#444] rounded p-2 min-h-[120px] max-h-[600px] overflow-y-auto transition-colors duration-200"
                style="resize: vertical;">
                <!-- JS Generated Rows will go here -->
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">新增目的地資料夾 (New Destination Folder)</label>
            <div class="flex gap-2">
                <input type="text" id="proj_name"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
                    value="20260228">
                <button onclick="setTodayName()"
                    class="bg-[#333] hover:bg-[#444] text-gray-300 border border-[#555] rounded px-3 text-xs transition whitespace-nowrap"
                    title="設定為今日日期">設為今日</button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">專案素材區 (Local Root)</label>
            <div class="flex gap-2">
                <input type="text" id="local_root"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm"
                    value="C:/A_TEST_DEST">
                <button onclick="pickPath('local_root', 'folder')"
                    class="bg-[#333] hover:bg-[#444] px-3 rounded border border-[#555] text-gray-300">📁</button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">異地備份區 (NAS Root)</label>
            <div class="flex gap-2">
                <input type="text" id="nas_root"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm"
                    value="C:/A_TEST_NAS">
                <button onclick="pickPath('nas_root', 'folder')"
                    class="bg-[#333] hover:bg-[#444] px-3 rounded border border-[#555] text-gray-300">📁</button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Proxy轉檔區 (Proxy Root)</label>
            <div class="flex gap-2">
                <input type="text" id="proxy_root"
                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-3 py-2 text-sm"
                    value="C:/A_TEST_PROXY">
                <button onclick="pickPath('proxy_root', 'folder')"
                    class="bg-[#333] hover:bg-[#444] px-3 rounded border border-[#555] text-gray-300">📁</button>
            </div>
        </div>
    </div>

    <!-- Right: Options -->
    <div class="space-y-4">
        <div class="pt-2">
            <label class="block text-sm font-medium text-gray-400 mb-2">執行項目</label>
            <div class="flex flex-wrap gap-4 text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="chk_hash"
                        class="form-checkbox text-blue-500 rounded bg-[#1e1e1e] border-[#444]">
                    <span>XXH64 完整性校驗</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="chk_transcode" checked onchange="renderHostSelector()"
                        class="form-checkbox text-blue-500 rounded bg-[#1e1e1e] border-[#444]">
                    <span>Proxy轉檔 (ProRes LT_720P_proxy)</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="chk_concat" checked onchange="renderHostSelector(); toggleConcatOptions()"
                        class="form-checkbox text-blue-500 rounded bg-[#1e1e1e] border-[#444]">
                    <span>自動時間碼串帶</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="chk_report" checked onchange="toggleReportOptions()"
                        class="form-checkbox text-blue-400 rounded bg-[#1e1e1e] border-[#444]">
                    <span class="text-white">檔案視覺報表</span>
                </label>

                <!-- Remote Host Selector Panel -->
                <div id="host_selector_panel"
                    class="hidden mt-3 p-3 bg-[#1a2a3a] border border-[#2e4a6e] rounded-lg">
                    <div class="text-xs text-blue-300 font-semibold mb-2">處理主機</div>
                    <div id="host_selector_checkboxes" class="flex flex-wrap gap-x-4 gap-y-1"></div>
                </div>

                <!-- Concat Options Panel (shown when chk_concat checked) -->
                <div id="concat_options_panel"
                    class="w-full mt-1 p-3 bg-[#1a2a3a] border border-[#2e4a6e] rounded-lg">
                    <div class="text-xs text-blue-300 font-semibold mb-2">🎬 串帶設定</div>
                    <div class="flex flex-wrap gap-4 items-center text-xs">
                        <label class="flex items-center gap-1 text-gray-300">
                            解析度
                            <select id="bk_cc_res" class="bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs text-gray-200 focus:outline-none focus:border-blue-500">
                                <option value="1080P">1080P</option>
                                <option value="720P" selected>720P</option>
                                <option value="Ultra HD">Ultra HD</option>
                            </select>
                        </label>
                        <label class="flex items-center gap-1 text-gray-300">
                            編碼
                            <select id="bk_cc_codec" class="bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs text-gray-200 focus:outline-none focus:border-blue-500">
                                <option value="ProRes">ProRes</option>
                                <option value="H.264 (NVENC)" selected>H.264 (NVENC)</option>
                                <option value="H.264 (軟體)">H.264 (軟體)</option>
                            </select>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer text-gray-300">
                            <input type="checkbox" id="bk_cc_burn_tc" checked class="form-checkbox text-blue-500 rounded bg-[#1e1e1e] border-[#444]">
                            燒入時間碼
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer text-gray-300">
                            <input type="checkbox" id="bk_cc_burn_fn" class="form-checkbox text-blue-500 rounded bg-[#1e1e1e] border-[#444]">
                            燒入檔名
                        </label>
                    </div>
                </div>

                <!-- Report Options Panel (shown when chk_report checked) -->
                <div id="report_options_panel"
                    class="w-full mt-1 p-3 bg-[#2a1a3a] border border-[#4e2e6e] rounded-lg">
                    <div class="text-xs text-purple-300 font-semibold mb-2">📊 報表設定</div>
                    <div class="flex flex-wrap gap-4 items-center text-xs mb-2">
                        <label class="flex items-center gap-1 text-gray-300 flex-1 min-w-[200px]">
                            報表名稱
                            <input type="text" id="bk_rpt_name" placeholder="空白=使用專案名稱"
                                class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs text-gray-200 focus:outline-none focus:border-purple-500">
                        </label>
                        <label class="flex items-center gap-1 text-gray-300 flex-1 min-w-[200px]">
                            輸出資料夾
                            <div class="flex gap-1 flex-1">
                                <input type="text" id="bk_rpt_output" placeholder="空白=專案素材區 (Local Root)"
                                    class="flex-1 bg-[#1e1e1e] border border-[#444] rounded px-2 py-1 text-xs text-gray-200 focus:outline-none focus:border-purple-500">
                                <button onclick="pickPath('bk_rpt_output', 'folder')"
                                    class="bg-[#333] hover:bg-[#444] px-2 rounded border border-[#555] text-gray-300 text-xs">📁</button>
                            </div>
                        </label>
                    </div>
                    <div class="flex flex-wrap gap-4 items-center text-xs">
                        <label class="flex items-center gap-1.5 cursor-pointer text-gray-300">
                            <input type="checkbox" id="bk_rpt_filmstrip" checked class="form-checkbox text-purple-500 rounded bg-[#1e1e1e] border-[#444]">
                            膠卷縮圖 (15 幀)
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer text-gray-300">
                            <input type="checkbox" id="bk_rpt_techspec" checked class="form-checkbox text-purple-500 rounded bg-[#1e1e1e] border-[#444]">
                            技術規格 (時間/FPS/解析度)
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer text-gray-300">
                            <input type="checkbox" id="bk_rpt_hash" class="form-checkbox text-purple-500 rounded bg-[#1e1e1e] border-[#444]">
                            XXH64 校驗碼 (較慢)
                        </label>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div class="mt-6 border-t border-[#3a3a3a] pt-4">
    <div class="flex flex-col h-full bg-[#1e1e1e] border border-[#2e4a6e] rounded-lg p-3">
        <div class="flex justify-between items-center mb-2">
            <h3 class="text-sm font-semibold text-blue-300">📜 最新備份報表 (NAS 全域索引)</h3>
            <button onclick="loadReportHistory()" class="text-xs bg-[#333] hover:bg-[#444] text-white py-1 px-3 rounded border border-[#555] transition-colors">
                🔄 重新載入
            </button>
        </div>
        <div id="main_history_list" class="bg-[#151515] border border-[#3a3a3a] rounded-lg flex-1 min-h-[120px] max-h-[160px] overflow-y-auto shadow-inner">
            <div class="px-4 py-8 text-center text-xs text-gray-500 flex items-center justify-center h-full">NAS 尚無歷史報表紀錄</div>
        </div>
    </div>

    <div class="flex justify-end gap-3 mt-4">
        <button onclick="scheduleJob('backup')"
            class="bg-[#333] hover:bg-[#444] text-gray-300 font-bold py-2 px-6 rounded shadow text-sm transition-colors border border-[#555]">
            排程
        </button>
        <button onclick="submitJob()"
            class="bg-[#1f538d] hover:bg-[#2a6cbf] text-white font-bold py-2 px-8 rounded shadow text-sm transition-colors">
            開始備份
        </button>
    </div>

    <!-- Progress Bar (四段式：備份/轉檔/串接/報表) -->
    <div id="bk-progress" class="mt-4 mb-2 hidden">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span id="bk-prog-label">進度：尚未開始</span>
            <span id="bk-prog-eta"></span>
        </div>
        <div class="relative w-full bg-[#1e1e1e] rounded-full h-4 border border-[#444] overflow-hidden flex">
            <div id="bk-seg-backup" class="h-4 transition-all duration-300 shrink-0" style="width: 0%; background-color: #1f538d;"></div>
            <div id="bk-seg-trans" class="h-4 transition-all duration-300 shrink-0" style="width: 0%; background-color: #d48a04;"></div>
            <div id="bk-seg-concat" class="h-4 transition-all duration-300 shrink-0" style="width: 0%; background-color: #228b22;"></div>
            <div id="bk-seg-report" class="h-4 transition-all duration-300 shrink-0 hidden" style="width: 0%; background-color: #7c3aed;"></div>
        </div>
        <div class="flex gap-4 mt-1 text-xs text-gray-500 flex-wrap">
            <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#1f538d"></span>[備份] <span id="bk-lbl-backup">0%</span></span>
            <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#d48a04"></span>[轉檔] <span id="bk-lbl-trans">0%</span></span>
            <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#228b22"></span>[串帶] <span id="bk-lbl-concat">0%</span></span>
            <span id="bk-legend-report" class="flex items-center gap-1 hidden"><span class="inline-block w-2 h-2 rounded-full" style="background:#7c3aed"></span>[報表] <span id="bk-lbl-report">0%</span></span>
        </div>
    </div>

    <!-- 遠端主機轉檔進度 -->
    <div id="bk-remote-hosts-progress" class="hidden mb-2 p-3 bg-[#1a1a2e] border border-[#2e3a6e] rounded-lg">
        <div class="text-xs text-blue-400 font-semibold mb-2">🖥️ 遠端主機轉檔進度</div>
        <div id="bk-remote-host-rows" class="flex flex-col gap-2"></div>
    </div>
</div>
