<div class="crm-root">
<!-- Sub-tabs: 專案 / 報價總覽 -->
<div class="crm-sub-tabs" id="proj-sub-tabs">
  <button class="crm-sub-tab active" data-view="projects">專案</button>
  <button class="crm-sub-tab" data-view="quotes">報價總覽</button>
</div>

<!-- ══ 專案子視圖 ══ -->
<div id="proj-view-projects" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;">

<!-- Project Toolbar -->
<div class="crm-toolbar">
  <input id="proj-search" type="search" placeholder="搜尋專案名稱..." class="crm-search-input">
  <select id="proj-filter-status" class="crm-select">
    <option value="">全部狀態</option>
    <option value="洽談中">洽談中</option>
    <option value="報價中">報價中</option>
    <option value="進行中">進行中</option>
    <option value="已結案">已結案</option>
  </select>
  <select id="proj-filter-client" class="crm-select">
    <option value="">全部客戶</option>
  </select>
  <select id="proj-filter-am" class="crm-select">
    <option value="">全部 AM</option>
  </select>
  <div class="crm-toolbar-right">
    <button id="proj-btn-expense" class="crm-btn crm-btn-secondary" onclick="window._projOpenExpensePage()">雜支登記</button>
    <button id="proj-btn-import" class="crm-btn crm-btn-secondary">匯入 CSV</button>
    <button id="proj-btn-add" class="crm-btn crm-btn-primary">+ 新增專案</button>
  </div>
</div>

<!-- Body: list + detail -->
<div class="crm-body">
  <div class="crm-list-panel" id="proj-list-panel">
    <div class="crm-list-header">
      <span class="crm-col-name"   data-sort-key="name">專案名稱 <span class="crm-sort-ind">↕</span></span>
      <span class="crm-col-client" data-sort-key="client">客戶 <span class="crm-sort-ind">↕</span></span>
      <span class="crm-col-status" data-sort-key="status">狀態 <span class="crm-sort-ind">↕</span></span>
      <span class="crm-col-am"     data-sort-key="am">AM <span class="crm-sort-ind">↕</span></span>
      <span class="crm-col-date"   data-sort-key="date">起始日 <span class="crm-sort-ind">↕</span></span>
      <span class="crm-col-actions"></span>
    </div>
    <div id="proj-list-body">
      <div class="crm-empty">載入中...</div>
    </div>
  </div>

  <div class="crm-resize-handle" id="proj-resize-handle" style="display:none;"></div>
  <div class="crm-detail-panel" id="proj-detail-panel" style="display:none;">
    <div class="crm-detail-bar">
      <div id="proj-detail-title" class="crm-detail-bar-title"></div>
      <div class="crm-detail-bar-tabs" id="proj-detail-tabs">
        <button class="crm-tab active" data-tab="info">專案總覽</button>
        <button class="crm-tab" data-tab="quotes">報價管理</button>
        <button class="crm-tab" data-tab="team">人員配置</button>
        <button class="crm-tab" data-tab="finance">專案帳目</button>
        <button class="crm-tab" data-tab="delivery">完稿結案</button>
      </div>
      <div class="crm-detail-bar-actions" id="proj-bar-actions">
        <button id="proj-detail-close" class="crm-detail-close" title="關閉">✕</button>
      </div>
    </div>
    <div id="proj-detail-content" class="crm-detail-content">
      <div id="proj-detail-info"></div>
      <div id="proj-detail-quotes" class="hidden"></div>
      <div id="proj-detail-team" class="hidden"></div>
      <div id="proj-detail-finance" class="hidden"></div>
      <div id="proj-detail-delivery" class="hidden"></div>
    </div>
  </div>
</div>
</div><!-- /proj-view-projects -->

<!-- ══ 報價總覽子視圖 ══ -->
<div id="proj-view-quotes" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;"></div>

</div><!-- /crm-root -->

<!-- Add / Edit Project Modal -->
<div id="proj-modal" class="crm-modal-overlay" style="display:none;">
  <div class="crm-modal">
    <div class="crm-modal-header">
      <h3 id="proj-modal-title">新增專案</h3>
      <button onclick="document.getElementById('proj-modal').style.display='none'" class="crm-detail-close">✕</button>
    </div>
    <div class="crm-modal-body">
      <div class="crm-form-section">基本資料</div>
      <div class="crm-form-grid">
        <div class="crm-field crm-field-full">
          <label>專案名稱 <span class="crm-required">*</span></label>
          <input id="proj-f-name" type="text" class="crm-input" placeholder="例：工研院形象影片">
        </div>
        <div class="crm-field">
          <label>客戶 <span class="crm-required">*</span></label>
          <select id="proj-f-client_id" class="crm-input">
            <option value="">— 選擇客戶 —</option>
          </select>
        </div>
        <div class="crm-field">
          <label>狀態</label>
          <select id="proj-f-status" class="crm-input">
            <option value="洽談中">洽談中</option>
            <option value="報價中">報價中</option>
            <option value="進行中">進行中</option>
            <option value="已結案">已結案</option>
          </select>
        </div>
        <div class="crm-field">
          <label>案件類型 <button class="crm-btn crm-btn-secondary crm-btn-sm" onclick="window._projEditTypes()" title="編輯類型" style="padding:2px 6px;margin-left:4px;">✎</button></label>
          <select id="proj-f-project_type" class="crm-input">
            <option value="">—</option>
          </select>
        </div>
        <div class="crm-field">
          <label>起始日</label>
          <input id="proj-f-start_date" type="date" class="crm-input">
        </div>
        <div class="crm-field">
          <label>結案日</label>
          <input id="proj-f-completion_date" type="date" class="crm-input">
        </div>
        <div class="crm-field">
          <label>專案資料夾</label>
          <input id="proj-f-folder_path" type="text" class="crm-input" placeholder="D:\Projects\...">
        </div>
        <div class="crm-field crm-field-full">
          <label>說明</label>
          <input id="proj-f-description" type="text" class="crm-input">
        </div>
      </div>

      <div class="crm-form-section">財務資訊</div>
      <div class="crm-form-grid">
        <div class="crm-field">
          <label>合約金額（含稅）</label>
          <input id="proj-f-contract_amount" type="number" class="crm-input" min="0">
        </div>
        <div class="crm-field">
          <label>稅率 (%)</label>
          <input id="proj-f-tax_rate" type="number" class="crm-input" value="5" min="0" max="100">
        </div>
        <div class="crm-field">
          <label>目標毛利率 (%)</label>
          <input id="proj-f-profit_target_pct" type="number" class="crm-input" value="20" min="0" max="100">
        </div>
        <div class="crm-field">
          <label>雜支比例 (%)</label>
          <input id="proj-f-misc_budget_pct" type="number" class="crm-input" value="5" min="0" max="100">
        </div>
      </div>

      <div class="crm-form-section">帳務追蹤</div>
      <div class="crm-form-grid">
        <div class="crm-field">
          <label>帳務狀況</label>
          <select id="proj-f-payment_status" class="crm-input">
            <option value="未到帳">未到帳</option>
            <option value="部分到帳">部分到帳</option>
            <option value="全額到帳">全額到帳</option>
          </select>
        </div>
        <div class="crm-field">
          <label>應收帳款</label>
          <input id="proj-f-amount_receivable" type="number" class="crm-input" min="0">
        </div>
        <div class="crm-field">
          <label>已收帳款</label>
          <input id="proj-f-amount_received" type="number" class="crm-input" min="0">
        </div>
        <div class="crm-field">
          <label>帳款匯費</label>
          <input id="proj-f-transfer_fee" type="number" class="crm-input" min="0">
        </div>
      </div>

      <div class="crm-form-section">人員配置</div>
      <div class="crm-form-grid">
        <div class="crm-field">
          <label>AM（業務）</label>
          <select id="proj-f-am_username" class="crm-input">
            <option value="">— 未指派 —</option>
          </select>
        </div>
        <div class="crm-field">
          <label>PM（專案經理）</label>
          <select id="proj-f-pm_usernames" class="crm-input">
            <option value="">— 未指派 —</option>
          </select>
        </div>
        <div class="crm-field crm-field-full">
          <label>備註</label>
          <textarea id="proj-f-notes" class="crm-input crm-textarea" rows="3" placeholder="其他備忘..."></textarea>
        </div>
      </div>
      <div id="proj-modal-error" class="crm-error" style="display:none;"></div>
    </div>
    <div class="crm-modal-footer">
      <button onclick="document.getElementById('proj-modal').style.display='none'" class="crm-btn crm-btn-secondary">取消</button>
      <button id="proj-btn-save" class="crm-btn crm-btn-primary">儲存</button>
    </div>
  </div>
</div>

<!-- CSV Import Modal -->
<div id="proj-import-modal" class="crm-modal-overlay" style="display:none;">
  <div class="crm-modal" style="max-width:480px;">
    <div class="crm-modal-header">
      <h3>匯入專案 CSV</h3>
      <button onclick="document.getElementById('proj-import-modal').style.display='none'" class="crm-detail-close">✕</button>
    </div>
    <div class="crm-modal-body">
      <p class="crm-import-hint">CSV 需包含「專案名稱」和「客戶」欄位。<br>客戶代稱需與系統中已有的客戶一致。<br>若專案名稱已存在則更新，否則新增。</p>
      <div class="crm-drop-zone" id="proj-drop-zone">
        <div class="crm-drop-icon">📂</div>
        <div>拖曳 CSV 檔案至此，或</div>
        <label class="crm-btn crm-btn-secondary" style="cursor:pointer;margin-top:8px;">
          選擇檔案
          <input id="proj-csv-file" type="file" accept=".csv" style="display:none;">
        </label>
        <div id="proj-drop-filename" style="margin-top:8px;color:#9ca3af;font-size:12px;"></div>
      </div>
      <div id="proj-import-result" style="display:none;" class="crm-import-result"></div>
    </div>
    <div class="crm-modal-footer">
      <button onclick="document.getElementById('proj-import-modal').style.display='none'" class="crm-btn crm-btn-secondary">關閉</button>
      <button id="proj-btn-do-import" class="crm-btn crm-btn-primary" disabled>開始匯入</button>
    </div>
  </div>
</div>
