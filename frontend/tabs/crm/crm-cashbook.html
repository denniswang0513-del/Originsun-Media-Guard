<!-- Cash Entry Toolbar -->
<div class="crm-toolbar">
  <input id="cash-search" type="search" placeholder="搜尋摘要、收款人..." class="crm-search-input">
  <select id="cash-filter-cat" class="crm-select">
    <option value="">全部類別</option>
    <option value="請款">請款</option>
    <option value="收支">收支</option>
    <option value="轉存">轉存</option>
  </select>
  <select id="cash-filter-item" class="crm-select">
    <option value="">全部項目</option>
    <option value="專案">專案</option>
    <option value="設備耗材">設備耗材</option>
    <option value="行政">行政</option>
    <option value="轉存">轉存</option>
  </select>
  <div class="crm-toolbar-right">
    <button id="cash-btn-import" class="crm-btn crm-btn-secondary">匯入 CSV</button>
    <button id="cash-btn-add" class="crm-btn crm-btn-primary">+ 新增</button>
  </div>
</div>

<!-- Body -->
<div class="crm-body">
  <div class="crm-list-panel" id="cash-list-panel">
    <div class="crm-list-header acct-header">
      <span data-sort-key="date">日期 <span class="crm-sort-ind">↕</span></span>
      <span data-sort-key="summary">內容 <span class="crm-sort-ind">↕</span></span>
      <span data-sort-key="deposit">收入 <span class="crm-sort-ind">↕</span></span>
      <span data-sort-key="expense">支出 <span class="crm-sort-ind">↕</span></span>
      <span data-sort-key="category">類別 <span class="crm-sort-ind">↕</span></span>
      <span data-sort-key="project">專案 <span class="crm-sort-ind">↕</span></span>
      <span data-sort-key="invoice">發票 <span class="crm-sort-ind">↕</span></span>
      <span style="flex:0 0 36px;"></span>
    </div>
    <div id="cash-list-body"><div class="crm-empty">載入中...</div></div>
  </div>

  <div class="crm-resize-handle" id="cash-resize-handle" style="display:none;"></div>
  <div class="crm-detail-panel" id="cash-detail-panel" style="display:none;">
    <div class="crm-detail-bar">
      <div id="cash-detail-title" class="crm-detail-bar-title"></div>
      <div class="crm-detail-bar-actions" id="cash-bar-actions">
        <button id="cash-detail-close" class="crm-detail-close" title="關閉">&#x2715;</button>
      </div>
    </div>
    <div class="crm-detail-content" id="cash-detail-content"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="cash-modal" class="crm-modal-overlay" style="display:none;">
  <div class="crm-modal">
    <div class="crm-modal-header">
      <h3 id="cash-modal-title">新增收支</h3>
      <button onclick="document.getElementById('cash-modal').style.display='none'" class="crm-detail-close">&#x2715;</button>
    </div>
    <div class="crm-modal-body">
      <!-- 1. 收支 -->
      <div class="crm-form-section">收支</div>
      <div class="crm-form-grid">
        <div class="crm-field">
          <label>日期</label>
          <input id="cash-f-entry_date" type="date" class="crm-input">
        </div>
        <div class="crm-field">
          <label>內容 <span class="crm-required">*</span></label>
          <input id="cash-f-summary" type="text" class="crm-input">
        </div>
        <div class="crm-field">
          <label>收入</label>
          <input id="cash-f-deposit" type="number" class="crm-input" min="0">
        </div>
        <div class="crm-field">
          <label>支出</label>
          <input id="cash-f-expense" type="number" class="crm-input" min="0">
        </div>
        <div class="crm-field">
          <label>類別</label>
          <select id="cash-f-category" class="crm-input">
            <option value="">—</option>
            <option value="水電網路">水電網路</option>
            <option value="交際應酬">交際應酬</option>
            <option value="行政">行政</option>
            <option value="其他">其他</option>
            <option value="其他收入">其他收入</option>
            <option value="房租">房租</option>
            <option value="建構">建構</option>
            <option value="專案">專案</option>
            <option value="專案外包">專案外包</option>
            <option value="專案雜支">專案雜支</option>
            <option value="教育訓練">教育訓練</option>
            <option value="設備耗材">設備耗材</option>
            <option value="設備維護">設備維護</option>
            <option value="軟體網路服務">軟體網路服務</option>
            <option value="勞健保">勞健保</option>
            <option value="發票代開">發票代開</option>
            <option value="會計">會計</option>
            <option value="業務推廣">業務推廣</option>
            <option value="製作金">製作金</option>
            <option value="銀行利息">銀行利息</option>
            <option value="獎金">獎金</option>
            <option value="請款單">請款單</option>
            <option value="辦公室管理費">辦公室管理費</option>
            <option value="營所稅">營所稅</option>
            <option value="營業稅">營業稅</option>
            <option value="薪資">薪資</option>
            <option value="轉存">轉存</option>
          </select>
        </div>
        <div class="crm-field crm-field-full">
          <label>備註</label>
          <input id="cash-f-note" type="text" class="crm-input">
        </div>
      </div>

      <!-- 2. 關聯資訊 -->
      <div class="crm-form-section">關聯資訊</div>
      <div class="crm-form-grid">
        <div class="crm-field crm-field-full" id="cash-field-project">
          <label>專案</label>
          <select id="cash-f-project_id" class="crm-input"><option value="">— 不關聯 —</option></select>
        </div>
        <div class="crm-field" id="cash-field-invoice">
          <label>發票</label>
          <select id="cash-f-invoice_id" class="crm-input"><option value="">— 不關聯 —</option></select>
        </div>
        <div class="crm-field" id="cash-field-bankfee">
          <label>匯費</label>
          <input id="cash-f-bank_fee" type="number" class="crm-input" min="0" value="0">
        </div>
        <!-- 預支關聯（專案雜支時顯示） -->
        <div id="cash-advance-section" class="crm-field crm-field-full" style="display:none;">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0;">
            <input type="checkbox" id="cash-f-advance-check" onchange="window._cashToggleAdvance(this.checked)"> 預支關聯
          </label>
          <div style="font-size:11px;color:#6b7280;margin-top:4px;">填「支出」= 發款，填「收入」= 收款</div>
          <div id="cash-advance-list" style="display:none;margin-top:8px;"></div>
          <input type="hidden" id="cash-f-advance_payment_id" value="">
        </div>
      </div>
      <div id="cash-verify-row" style="display:none;padding:8px 0;font-size:12px;color:#9ca3af;"></div>

      <!-- 3. 補充資訊 -->
      <div class="crm-form-section">補充資訊</div>
      <div class="crm-form-grid">
        <div class="crm-field">
          <label>客戶</label>
          <div id="cash-client-match" style="font-size:13px;color:#6b7280;padding:6px 0;">—</div>
        </div>
      </div>

      <div id="cash-modal-error" class="crm-error" style="display:none;"></div>
    </div>
    <div class="crm-modal-footer">
      <button onclick="document.getElementById('cash-modal').style.display='none'" class="crm-btn crm-btn-secondary">取消</button>
      <button id="cash-btn-save" class="crm-btn crm-btn-primary">儲存</button>
    </div>
  </div>
</div>

<!-- CSV Import Modal -->
<div id="cash-import-modal" class="crm-modal-overlay" style="display:none;">
  <div class="crm-modal" style="max-width:480px;">
    <div class="crm-modal-header">
      <h3>匯入收支 CSV</h3>
      <button onclick="document.getElementById('cash-import-modal').style.display='none'" class="crm-detail-close">&#x2715;</button>
    </div>
    <div class="crm-modal-body">
      <p class="crm-import-hint">支援你現有的收支明細表格式。</p>
      <div class="crm-drop-zone" id="cash-drop-zone">
        <div class="crm-drop-icon">📂</div>
        <div>拖曳 CSV 至此，或</div>
        <label class="crm-btn crm-btn-secondary" style="cursor:pointer;margin-top:8px;">
          選擇檔案<input id="cash-csv-file" type="file" accept=".csv" style="display:none;">
        </label>
        <div id="cash-drop-filename" style="margin-top:8px;color:#9ca3af;font-size:12px;"></div>
      </div>
      <div id="cash-import-result" style="display:none;" class="crm-import-result"></div>
    </div>
    <div class="crm-modal-footer">
      <button onclick="document.getElementById('cash-import-modal').style.display='none'" class="crm-btn crm-btn-secondary">關閉</button>
      <button id="cash-btn-do-import" class="crm-btn crm-btn-primary" disabled>開始匯入</button>
    </div>
  </div>
</div>
