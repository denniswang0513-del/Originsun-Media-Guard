<div class="flex flex-col gap-4">

  <!-- Header Notice -->
  <div class="bg-amber-900 border border-amber-600 rounded-lg px-4 py-2 flex items-center gap-2 text-amber-200 text-sm">
    🚧 <strong>語音合成功能開發中</strong> — 部分功能可能尚未完整，請謹慎使用。
  </div>

  <!-- Mode Tabs -->
  <div class="flex gap-2 border-b border-[#444]">
    <button id="tts_mode_btn_standard" onclick="setTtsMode('standard')"
      class="tts-mode-btn active-mode px-4 py-2 text-sm font-semibold text-white border-b-2 border-blue-500 transition-colors">
      標準 TTS
    </button>
    <button id="tts_mode_btn_xtts" onclick="setTtsMode('xtts')"
      class="tts-mode-btn px-4 py-2 text-sm font-semibold text-gray-400 hover:text-white border-b-2 border-transparent transition-colors">
      聲音克隆 (開發中)
    </button>
  </div>

  <!-- XTTS Model Status Banner (shown only for Clone/Library modes) -->
  <div id="xtts_status_banner" class="hidden bg-[#1a2a3a] border border-[#2e4a6e] rounded-lg px-4 py-3 flex items-center justify-between text-sm">
    <span id="xtts_status_text" class="text-gray-300">正在檢查 XTTS v2 模型狀態...</span>
    <button id="btn_download_xtts" onclick="downloadXttsModel()"
      class="hidden bg-blue-700 hover:bg-blue-600 text-white text-xs font-bold py-1 px-3 rounded transition-colors">
      下載模型 (~2GB)
    </button>
  </div>

  <!-- === STANDARD TTS MODE === -->
  <div id="tts_panel_standard">
    <!-- Row 1: Filters -->
    <div class="grid grid-cols-3 gap-3 mb-2 px-3 py-2 bg-[#1a1a1a] border border-[#333] rounded-lg">
      <div>
        <label class="block text-[10px] text-gray-500 mb-1 uppercase tracking-wider">語系 Language</label>
        <select id="tts_filter_lang" onchange="updateTtsFilterRegions(); updateTtsVoices();"
          class="w-full bg-[#252525] border border-[#3a3a3a] rounded px-2 py-1.5 text-sm text-white focus:border-blue-500 focus:outline-none">
          <!-- JS populated -->
        </select>
      </div>
      <div>
        <label class="block text-[10px] text-gray-500 mb-1 uppercase tracking-wider">區域 Region</label>
        <select id="tts_filter_region" onchange="updateTtsVoices()"
          class="w-full bg-[#252525] border border-[#3a3a3a] rounded px-2 py-1.5 text-sm text-white focus:border-blue-500 focus:outline-none">
          <option value="all">全部</option>
        </select>
      </div>
      <div>
        <label class="block text-[10px] text-gray-500 mb-1 uppercase tracking-wider">性別 Gender</label>
        <select id="tts_filter_gender" onchange="updateTtsVoices()"
          class="w-full bg-[#252525] border border-[#3a3a3a] rounded px-2 py-1.5 text-sm text-white focus:border-blue-500 focus:outline-none">
          <option value="all">全部 (All)</option>
          <option value="Female">女聲 (Female)</option>
          <option value="Male">男聲 (Male)</option>
        </select>
      </div>
    </div>

    <!-- Row 2: Voice selector + preview + sliders -->
    <div class="px-3 py-3 bg-[#1a1a1a] border border-[#333] rounded-lg space-y-3">
      <!-- Voice -->
      <div class="flex items-center gap-2">
        <label class="text-[10px] text-gray-500 uppercase tracking-wider shrink-0 w-20">聲音 Voice</label>
        <select id="tts_voice"
          class="flex-1 bg-[#252525] border border-[#3a3a3a] rounded px-2 py-1.5 text-sm text-white focus:border-blue-500 focus:outline-none">
          <option value="">正在載入聲音庫...</option>
        </select>
        <button onclick="previewTtsVoice()" id="btn_tts_preview"
          class="shrink-0 bg-blue-800 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm border border-blue-700 transition-colors"
          title="試聽此聲音">試聽</button>
      </div>

      <!-- Speed -->
      <div class="flex items-center gap-3">
        <label class="text-[10px] text-gray-500 uppercase tracking-wider shrink-0 w-20">語速 Speed</label>
        <input type="range" id="tts_rate" min="-50" max="50" value="0" step="5"
          oninput="document.getElementById('tts_rate_label').textContent = (this.value >= 0 ? '+' : '') + this.value + '%'"
          class="flex-1 accent-blue-500 h-1.5">
        <span id="tts_rate_label" class="text-xs text-blue-300 font-mono w-10 text-right">+0%</span>
      </div>

      <!-- Pitch -->
      <div class="flex items-center gap-3">
        <label class="text-[10px] text-gray-500 uppercase tracking-wider shrink-0 w-20">音高 Pitch</label>
        <input type="range" id="tts_pitch" min="-10" max="10" value="0" step="1"
          oninput="document.getElementById('tts_pitch_label').textContent = (this.value >= 0 ? '+' : '') + this.value + 'Hz'"
          class="flex-1 accent-blue-500 h-1.5">
        <span id="tts_pitch_label" class="text-xs text-blue-300 font-mono w-10 text-right">+0Hz</span>
      </div>
    </div>
  </div>


  <!-- === XTTS CLONE & LIBRARY MODE === -->
  <div id="tts_panel_xtts" class="hidden">
    <div class="grid grid-cols-2 gap-4 mb-4">
      
      <!-- LEFT: NAS Library List -->
      <div class="flex flex-col bg-[#1a1a1a] border border-[#333] rounded-lg p-3">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 border-b border-[#333] pb-1">聲音庫 (NAS)</h3>
        <p class="text-[10px] text-gray-500 mb-2 leading-relaxed">選擇已建立的角色進行合成。建立新角色請點擊下方按鈕，直接儲存至 NAS。</p>
        <div id="tts_library_list" class="flex-grow overflow-auto h-40 space-y-1 mb-2 pr-1 custom-scrollbar">
          <p class="text-gray-500 text-xs text-center py-4">正在從 NAS 載入聲音庫...</p>
        </div>
        <button onclick="addVoiceToLibrary()" class="bg-[#2a2a2a] hover:bg-[#333] border border-[#555] text-gray-300 text-[11px] py-1.5 px-2 font-bold rounded transition-colors w-full mt-auto">
          + 新增角色存入 NAS
        </button>
      </div>

      <!-- RIGHT: Voice Clone / Temporary Dropzone -->
      <div class="flex flex-col bg-[#1a1a1a] border border-[#333] rounded-lg p-3">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 border-b border-[#333] pb-1">臨時克隆區</h3>
        <p class="text-[10px] text-gray-500 mb-2 leading-relaxed">不想存入資料庫？請將短音檔拖曳至此，進行單次臨時合成。</p>
        <div class="bg-[#1e1e1e] border-2 border-dashed border-[#444] rounded-lg p-4 text-center mb-2 flex-grow" id="tts_clone_dropzone">
          <p class="text-gray-400 text-sm mb-2">拖曳參考音訊至此，或使用原生選取</p>
          <div class="flex gap-1 mb-1">
            <input type="text" id="tts_ref_audio_path_display" readonly placeholder="尚未選擇參考音訊..."
              class="flex-1 bg-[#151515] border border-[#333] rounded px-2 py-1 text-[11px] text-gray-400 focus:outline-none">
            <button onclick="pickTtsReferenceNative()" class="bg-[#333] hover:bg-[#444] text-white text-xs py-1 px-3 rounded border border-[#555] transition-colors">📂 選取</button>
          </div>
          <p class="text-[10px] text-gray-500 mt-1">支援 .wav/.mp3（3~6 秒清晰語音）</p>
        </div>
        <div id="tts_ref_info" class="hidden bg-[#1a2a1a] border border-[#3a6a3a] rounded px-2 py-1.5 flex flex-col gap-2 text-sm">
          <div class="flex justify-between items-center border-b border-[#2a4a2a] pb-1">
            <span id="tts_ref_name" class="text-green-300 text-xs font-mono truncate w-[80%]" title="">ref.wav</span>
            <button onclick="clearTtsRef()" class="text-red-400 hover:text-red-300 text-xs px-1">✕ 清除</button>
          </div>
          <button onclick="saveTtsToLibrary()" class="bg-[#1f538d] hover:bg-[#2a6cbf] text-white text-xs py-1.5 rounded transition-colors w-full">
            轉存至左側聲音庫 (NAS)
          </button>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Current selected voice indicator (Clone/Library) -->
  <div id="tts_selected_profile_info" class="hidden bg-[#1a1a2a] border border-[#3a3a6a] rounded px-3 py-2 text-sm text-blue-300">
    當前選用：<strong id="tts_selected_profile_name">—</strong>
  </div>

  <!-- Text Input -->
  <div>
    <label class="block text-xs text-gray-400 mb-1">合成文字 <span class="text-gray-600">（或拖曳 .txt 檔）</span></label>
    <textarea id="tts_text_input" rows="6" placeholder="在此輸入要轉換為語音的文字..."
      class="w-full bg-[#1e1e1e] border border-[#555] rounded px-3 py-2 text-sm focus:border-blue-500 resize-y font-sans"></textarea>
    
    <!-- Stats Bar -->
    <div class="flex items-center justify-between mt-1 text-xs text-gray-500 bg-[#1a1a1a] rounded px-3 py-1.5 border-t border-[#333]">
      <div class="flex items-center space-x-4">
        <span>字數: <span id="tts_char_count" class="font-mono text-gray-300">0</span></span>
        <span class="text-gray-600">|</span>
        <span>時長: <strong id="tts_est_duration" class="font-mono text-blue-300">--:--.-</strong></span>
        <span class="text-gray-600">|</span>
        <span>速律: <span id="tts_est_rate" class="font-mono text-purple-300">-.- 字/秒</span></span>
      </div>
      <button onclick="calculateTtsDuration()" id="tts_calc_btn" class="bg-[#2d3748] hover:bg-[#4a5568] text-gray-300 py-1 px-3 rounded border border-[#4a5568] transition-colors flex items-center gap-1.5 focus:outline-none">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        計算音檔時長
      </button>
    </div>
  </div>

  <!-- Output Settings -->
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-xs text-gray-400 mb-1">輸出目錄</label>
      <div class="flex gap-1">
        <input type="text" id="tts_output_dir" placeholder="輸出資料夾目錄"
          class="flex-1 bg-[#1e1e1e] border border-[#555] rounded px-2 py-1.5 text-sm focus:border-blue-500">
        <button onclick="pickTtsOutputDir()" class="bg-[#333] hover:bg-[#444] px-3 font-bold rounded border border-[#555] text-gray-300 transition-colors">📂</button>
      </div>
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">輸出檔名</label>
      <input type="text" id="tts_output_name" placeholder="output（不含副檔名）"
        class="w-full bg-[#1e1e1e] border border-[#555] rounded px-2 py-1.5 text-sm focus:border-blue-500">
    </div>
  </div>

  <!-- TTS progress bar -->
  <div id="tts_progress_area" class="hidden mt-2 p-4 bg-[#1e1e1e] border border-[#333] rounded-lg">
      <div class="flex justify-between text-xs text-gray-400 mb-1">
          <span id="tts_prog_label">準備中...</span>
          <span id="tts_prog_pct">0%</span>
      </div>
      <div class="w-full bg-[#2a2a2a] rounded-full h-3 border border-[#444] overflow-hidden">
          <div id="tts_prog_bar" class="h-3 rounded-full transition-all duration-300" style="width: 0%; background: linear-gradient(90deg, #3b82f6, #60a5fa);"></div>
      </div>
  </div>

  <!-- Submit Button -->
  <div class="flex justify-end mt-2">
    <button id="btn_start_tts" onclick="submitTtsJob()"
      class="bg-blue-700 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded shadow transition-colors">
      開始合成
    </button>
  </div>

</div>

<style>
.tts-mode-btn.active-mode {
  color: white;
  border-bottom-color: #3b82f6;
}
</style>
