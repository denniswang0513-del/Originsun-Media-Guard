<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Showcase — Originsun Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0e0e0e; --bg2: #161616; --bg3: #1e1e1e;
  --text: #e8e6e3; --text2: #9a9590; --text3: #5a5550;
  --accent: #c8a45c; --accent2: #e8c97c;
  --border: #2a2825; --border2: #3a3835;
  --card: #141414; --card-hover: #1a1a1a;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Noto Sans TC', sans-serif;
  --radius: 2px;
  --max-w: 1080px;
}
[data-theme="light"] {
  --bg: #f5f2ed; --bg2: #ebe8e3; --bg3: #e0ddd8;
  --text: #1a1815; --text2: #6a6560; --text3: #9a9590;
  --accent: #8a6a2a; --accent2: #a0802a;
  --border: #d5d0c8; --border2: #c5c0b8;
  --card: #faf8f5; --card-hover: #f0eee9;
}

html { scroll-behavior: smooth }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 15px;
  min-height: 100vh;
  transition: background .4s, color .4s;
}

/* ── Grain overlay ── */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── Loading ── */
#loading {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  transition: opacity .5s;
}
#loading.fade { opacity: 0; pointer-events: none }
.loading-bar { width: 120px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden }
.loading-bar::after { content:''; display:block; width:40%; height:100%; background:var(--accent); animation: loadSlide 1s ease infinite }
@keyframes loadSlide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
.loading-text { font-family: var(--font-display); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text3) }

/* ── Error ── */
#error { display:none; text-align:center; padding:120px 20px; color:var(--text3); font-family:var(--font-display) }
#error h2 { font-size:48px; font-weight:300; color:var(--text2); margin-bottom:8px }
#error p { font-size:14px; letter-spacing:1px }

/* ── Theme toggle ── */
.theme-toggle {
  position: fixed; top: 20px; right: 20px; z-index: 100;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all .3s;
}
.theme-toggle:hover { background: var(--border); color: var(--text) }

/* ── Hero ── */
.hero {
  position: relative; width: 100%; min-height: 55vh;
  display: flex; align-items: flex-end; justify-content: center;
  overflow: hidden;
}
.hero-cover {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform 8s ease-out;
}
.hero.loaded .hero-cover { transform: scale(1.04) }
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, var(--bg) 0%, transparent 50%, rgba(0,0,0,.2) 100%);
}
.hero-content {
  position: relative; z-index: 2;
  max-width: var(--max-w); width: 100%;
  padding: 0 32px 48px;
}
.hero-client {
  font-family: var(--font-display); font-size: 12px; font-weight: 400;
  color: var(--accent); letter-spacing: 4px; text-transform: uppercase;
  margin-bottom: 8px;
}
.hero-title {
  font-family: var(--font-display); font-size: 48px; font-weight: 600;
  line-height: 1.15; letter-spacing: -1px;
  text-shadow: 0 2px 24px rgba(0,0,0,.5);
}
.hero-no-cover {
  min-height: 30vh;
  background: var(--bg2);
}

/* ── Main layout ── */
.showcase {
  max-width: var(--max-w); margin: 0 auto;
  padding: 48px 32px 80px;
  opacity: 0; transform: translateY(20px);
  transition: all .6s ease;
}
.showcase.visible { opacity: 1; transform: translateY(0) }

/* ── Section ── */
.sc-section { margin-bottom: 64px; animation: fadeUp .6s ease both }
.sc-label {
  font-family: var(--font-display); font-size: 10px; font-weight: 500;
  letter-spacing: 4px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
}
.sc-label::after { content:''; flex:1; height:1px; background:var(--border) }

/* ── Description ── */
.sc-desc {
  font-size: 16px; line-height: 2; color: var(--text2);
  max-width: 720px; white-space: pre-wrap;
}

/* ── Video embed ── */
.sc-video {
  width: 100%; aspect-ratio: 16/9;
  background: var(--bg3); border-radius: var(--radius);
  overflow: hidden; border: 1px solid var(--border);
}
.sc-video iframe { width: 100%; height: 100%; border: none }

/* ── Gallery ── */
.sc-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.sc-gallery-item {
  position: relative; overflow: hidden;
  border-radius: var(--radius); border: 1px solid var(--border);
  cursor: pointer; background: var(--bg3);
  aspect-ratio: 16/10;
}
.sc-gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .4s;
}
.sc-gallery-item:hover img { transform: scale(1.05) }
.sc-gallery-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 24px 12px 10px;
  background: linear-gradient(to top, rgba(0,0,0,.7), transparent);
  font-size: 12px; color: #ddd;
  opacity: 0; transition: opacity .3s;
}
.sc-gallery-item:hover .sc-gallery-caption { opacity: 1 }

/* ── Lightbox ── */
.lightbox {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.92);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; opacity: 0;
  transition: opacity .3s; pointer-events: none;
}
.lightbox.active { opacity: 1; pointer-events: all }
.lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 4px }
.lightbox-caption {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  font-size: 13px; color: var(--text2); font-family: var(--font-display);
  letter-spacing: 1px; text-align: center;
}
.lightbox-close {
  position: absolute; top: 20px; right: 20px; width: 40px; height: 40px;
  background: rgba(255,255,255,.1); border: none; border-radius: 50%;
  color: #fff; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.lightbox-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.lightbox-nav:hover { background: rgba(255,255,255,.18) }
.lightbox-prev { left: 20px }
.lightbox-next { right: 20px }

/* ── Video Modal ── */
.video-modal {
  position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.85);
  display: flex; align-items: center; justify-content: center; padding: 24px;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
.video-modal.active { opacity: 1; pointer-events: all }
.video-modal iframe { width: 100%; max-width: 900px; aspect-ratio: 16/9; border: none; border-radius: 4px }
.video-modal-close {
  position: absolute; top: 20px; right: 20px; width: 40px; height: 40px;
  background: rgba(255,255,255,.1); border: none; border-radius: 50%;
  color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── Timeline (process) ── */
.sc-timeline { position: relative; padding-left: 36px }
.sc-timeline::before {
  content: ''; position: absolute; left: 14px; top: 0; bottom: 0;
  width: 1px; background: var(--border);
}
.sc-timeline-phase {
  margin-bottom: 40px; position: relative;
}
.sc-timeline-dot {
  position: absolute; left: -36px; top: 4px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg);
  box-shadow: 0 0 0 3px var(--border);
}
.sc-phase-title {
  font-family: var(--font-display); font-size: 16px; font-weight: 600;
  margin-bottom: 16px; color: var(--text);
}
.sc-phase-items {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.sc-phase-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  transition: all .3s;
}
.sc-phase-card:hover { border-color: var(--border2); transform: translateY(-2px) }
.sc-phase-thumb {
  width: 100%; aspect-ratio: 16/10; background: var(--bg3);
  overflow: hidden; position: relative;
}
.sc-phase-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s }
.sc-phase-card:hover .sc-phase-thumb img { transform: scale(1.05) }
.sc-phase-play {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.4); opacity: 0; transition: opacity .3s;
}
.sc-phase-card:hover .sc-phase-play { opacity: 1 }
.sc-phase-play-icon {
  width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.9);
  display: flex; align-items: center; justify-content: center;
}
.sc-phase-play-icon::after {
  content: ''; display: block; width: 0; height: 0;
  border-style: solid; border-width: 7px 0 7px 12px;
  border-color: transparent transparent transparent #1a1a1a; margin-left: 2px;
}
.sc-phase-caption { padding: 10px 14px; font-size: 13px; color: var(--text2) }

/* ── Credits ── */
.sc-credits { display: flex; flex-wrap: wrap; gap: 12px }
.sc-credit {
  padding: 12px 20px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius);
  display: flex; align-items: center; gap: 12px;
  transition: all .3s;
}
.sc-credit:hover { border-color: var(--border2) }
.sc-credit-role {
  font-family: var(--font-display); font-size: 11px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
}
.sc-credit-name { font-size: 14px; font-weight: 500 }
.sc-credit-name a {
  color: var(--text); text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: all .2s;
}
.sc-credit-name a:hover { color: var(--accent); border-bottom-color: var(--accent) }

/* ── Tags ── */
.sc-tags { display: flex; flex-wrap: wrap; gap: 8px }
.sc-tag {
  padding: 6px 16px; font-size: 12px; font-weight: 500;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2); letter-spacing: 0.5px;
  font-family: var(--font-display);
}

/* ── Footer ── */
.sc-footer {
  text-align: center; padding-top: 48px; margin-top: 48px;
  border-top: 1px solid var(--border);
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: 2px; color: var(--text3);
}

/* ── Animations ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
.sc-section:nth-child(2) { animation-delay:.1s }
.sc-section:nth-child(3) { animation-delay:.15s }
.sc-section:nth-child(4) { animation-delay:.2s }
.sc-section:nth-child(5) { animation-delay:.25s }
.sc-section:nth-child(6) { animation-delay:.3s }

/* ── Mobile ── */
@media (max-width: 700px) {
  .hero { min-height: 40vh }
  .hero-title { font-size: 30px }
  .hero-content { padding: 0 20px 32px }
  .showcase { padding: 32px 16px 60px }
  .sc-gallery { grid-template-columns: 1fr 1fr }
  .sc-phase-items { grid-template-columns: 1fr }
  .sc-credits { flex-direction: column }
  .theme-toggle { top: 12px; right: 12px }
}
@media (max-width: 420px) {
  .sc-gallery { grid-template-columns: 1fr }
  .hero-title { font-size: 24px }
}
</style>
</head>
<body>

<button class="theme-toggle" onclick="_toggleTheme()" title="切換主題">&#9728;</button>

<div id="loading">
  <div class="loading-bar"></div>
  <div class="loading-text">Loading</div>
</div>

<div id="error">
  <h2>404</h2>
  <p>此專案尚未公開或不存在</p>
</div>

<div id="heroWrap" class="hero" style="display:none"></div>
<div class="showcase" id="showcase"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">&#10005;</button>
  <button class="lightbox-nav lightbox-prev" id="lbPrev">&#8249;</button>
  <button class="lightbox-nav lightbox-next" id="lbNext">&#8250;</button>
  <img id="lbImg" src="" alt="">
  <div class="lightbox-caption" id="lbCaption"></div>
</div>

<!-- Video Modal -->
<div class="video-modal" id="videoModal">
  <button class="video-modal-close" id="vmClose">&#10005;</button>
  <iframe id="videoFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<script>
const _params = new URLSearchParams(location.search);
const _projectId = _params.get('id');

/* ── Helpers ── */
function _toggleTheme() {
  const h = document.documentElement;
  const n = h.dataset.theme === 'dark' ? 'light' : 'dark';
  h.dataset.theme = n;
  document.querySelector('.theme-toggle').innerHTML = n === 'dark' ? '&#9728;' : '&#9790;';
}

function _esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function _videoId(url) {
  if (!url) return null;
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if (m) return { type: 'yt', id: m[1] };
  m = url.match(/vimeo\.com\/(\d+)/);
  if (m) return { type: 'vm', id: m[1] };
  return null;
}

function _embedUrl(v) {
  if (!v) return '';
  if (v.type === 'yt') return 'https://www.youtube-nocookie.com/embed/' + v.id;
  if (v.type === 'vm') return 'https://player.vimeo.com/video/' + v.id;
  return '';
}

/* ── Lightbox state ── */
let _lbItems = [];
let _lbIdx = 0;

function _openLightbox(items, idx) {
  _lbItems = items; _lbIdx = idx;
  _showLbImage();
  document.getElementById('lightbox').classList.add('active');
}
function _closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
function _lbNav(dir) {
  _lbIdx = (_lbIdx + dir + _lbItems.length) % _lbItems.length;
  _showLbImage();
}
function _showLbImage() {
  const item = _lbItems[_lbIdx];
  document.getElementById('lbImg').src = item.url;
  document.getElementById('lbCaption').textContent = item.caption || '';
}

document.getElementById('lbClose').addEventListener('click', _closeLightbox);
document.getElementById('lbPrev').addEventListener('click', function() { _lbNav(-1); });
document.getElementById('lbNext').addEventListener('click', function() { _lbNav(1); });
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) _closeLightbox(); });

/* ── Video modal ── */
function _openVideo(url) {
  const v = _videoId(url);
  if (!v) { window.open(url, '_blank'); return; }
  document.getElementById('videoFrame').src = _embedUrl(v) + '?autoplay=1';
  document.getElementById('videoModal').classList.add('active');
}
function _closeVideo() {
  document.getElementById('videoFrame').src = '';
  document.getElementById('videoModal').classList.remove('active');
}
document.getElementById('vmClose').addEventListener('click', _closeVideo);
document.getElementById('videoModal').addEventListener('click', function(e) { if (e.target === this) _closeVideo(); });

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { _closeLightbox(); _closeVideo(); }
  if (document.getElementById('lightbox').classList.contains('active')) {
    if (e.key === 'ArrowLeft') _lbNav(-1);
    if (e.key === 'ArrowRight') _lbNav(1);
  }
});

/* ── Load ── */
async function _load() {
  if (!_projectId) { _showError(); return; }
  try {
    const res = await fetch('/api/v1/crm/public/showcase/' + encodeURIComponent(_projectId));
    if (!res.ok) { _showError(); return; }
    const data = await res.json();
    _render(data);
  } catch (_) { _showError(); }
}

function _showError() {
  document.getElementById('loading').classList.add('fade');
  document.getElementById('error').style.display = 'block';
}

function _render(data) {
  const sc = data.showcase || {};
  const projName = data.project_name || '';
  const clientName = data.client_name || '';
  const gallery = sc.gallery || [];
  const credits = sc.credits || [];
  const tags = sc.tags || [];
  const processItems = sc.process_items || [];
  const processMode = sc.process_mode || 'gallery';

  document.title = projName + ' — Originsun Studio';

  /* ── JSON-LD structured data ── */
  const ld = {
    '@context': 'https://schema.org',
    '@type': 'CreativeWork',
    'name': projName,
    'description': sc.description || '',
    'creator': { '@type': 'Organization', 'name': 'Originsun Studio' }
  };
  if (clientName) ld['accountablePerson'] = { '@type': 'Organization', 'name': clientName };
  if (sc.video_url) ld['video'] = { '@type': 'VideoObject', 'embedUrl': sc.video_url };
  if (tags.length) ld['keywords'] = tags.join(', ');
  const ldScript = document.createElement('script');
  ldScript.type = 'application/ld+json';
  ldScript.textContent = JSON.stringify(ld);
  document.head.appendChild(ldScript);

  /* ── Hero ── */
  const heroEl = document.getElementById('heroWrap');
  heroEl.style.display = '';
  if (sc.cover_url) {
    heroEl.innerHTML =
      '<div class="hero-cover" style="background-image:url(\'' + _esc(sc.cover_url) + '\')"></div>' +
      '<div class="hero-overlay"></div>' +
      '<div class="hero-content">' +
        (clientName ? '<div class="hero-client">' + _esc(clientName) + '</div>' : '') +
        '<h1 class="hero-title">' + _esc(projName) + '</h1>' +
      '</div>';
    setTimeout(function() { heroEl.classList.add('loaded'); }, 100);
  } else {
    heroEl.classList.add('hero-no-cover');
    heroEl.innerHTML =
      '<div class="hero-overlay"></div>' +
      '<div class="hero-content">' +
        (clientName ? '<div class="hero-client">' + _esc(clientName) + '</div>' : '') +
        '<h1 class="hero-title">' + _esc(projName) + '</h1>' +
      '</div>';
  }

  /* ── Body ── */
  var html = '';

  // Description
  if (sc.description) {
    html += '<div class="sc-section">' +
      '<div class="sc-label">About</div>' +
      '<div class="sc-desc">' + _esc(sc.description) + '</div>' +
    '</div>';
  }

  // Main Video
  var mainVid = _videoId(sc.video_url);
  if (mainVid) {
    html += '<div class="sc-section">' +
      '<div class="sc-label">Video</div>' +
      '<div class="sc-video"><iframe src="' + _esc(_embedUrl(mainVid)) + '" allow="encrypted-media" allowfullscreen></iframe></div>' +
    '</div>';
  }

  // Gallery
  if (gallery.length > 0) {
    html += '<div class="sc-section">' +
      '<div class="sc-label">Gallery</div>' +
      '<div class="sc-gallery" id="galleryGrid">' +
      gallery.map(function(g, i) {
        return '<div class="sc-gallery-item" data-lb-idx="' + i + '">' +
          '<img src="' + _esc(g.url) + '" alt="' + _esc(g.caption || '') + '" loading="lazy">' +
          (g.caption ? '<div class="sc-gallery-caption">' + _esc(g.caption) + '</div>' : '') +
        '</div>';
      }).join('') +
      '</div></div>';
  }

  // Creative Process
  if (processItems.length > 0) {
    html += '<div class="sc-section">' +
      '<div class="sc-label">Creative Process</div>';

    if (processMode === 'timeline') {
      var phases = { '前期': [], '拍攝': [], '後期': [] };
      processItems.forEach(function(it) {
        var p = it.phase || '後期';
        if (!phases[p]) phases[p] = [];
        phases[p].push(it);
      });
      html += '<div class="sc-timeline">';
      ['前期', '拍攝', '後期'].forEach(function(phase) {
        if (phases[phase].length === 0) return;
        html += '<div class="sc-timeline-phase">' +
          '<div class="sc-timeline-dot"></div>' +
          '<div class="sc-phase-title">' + _esc(phase) + '</div>' +
          '<div class="sc-phase-items">' +
          phases[phase].map(function(it) {
            var isVid = it.type === 'video' && it.video_url;
            return '<div class="sc-phase-card" ' + (isVid ? 'data-video-url="' + _esc(it.video_url) + '"' : '') + '>' +
              (it.url ? '<div class="sc-phase-thumb"><img src="' + _esc(it.url) + '" alt="' + _esc(it.caption || '') + '" loading="lazy">' +
                (isVid ? '<div class="sc-phase-play"><div class="sc-phase-play-icon"></div></div>' : '') +
              '</div>' : '') +
              (it.caption ? '<div class="sc-phase-caption">' + _esc(it.caption) + '</div>' : '') +
            '</div>';
          }).join('') +
          '</div></div>';
      });
      html += '</div>';
    } else if (processMode === 'media') {
      html += '<div class="sc-phase-items" id="processMedia">' +
        processItems.map(function(it) {
          var isVid = it.type === 'video' && it.video_url;
          return '<div class="sc-phase-card" ' + (isVid ? 'data-video-url="' + _esc(it.video_url) + '"' : '') + '>' +
            (it.url ? '<div class="sc-phase-thumb"><img src="' + _esc(it.url) + '" alt="' + _esc(it.caption || '') + '" loading="lazy">' +
              (isVid ? '<div class="sc-phase-play"><div class="sc-phase-play-icon"></div></div>' : '') +
            '</div>' : '') +
            (it.caption ? '<div class="sc-phase-caption">' + _esc(it.caption) + '</div>' : '') +
          '</div>';
        }).join('') +
      '</div>';
    } else {
      /* gallery mode */
      html += '<div class="sc-gallery" id="processGallery">' +
        processItems.map(function(it, i) {
          return '<div class="sc-gallery-item" data-proc-idx="' + i + '">' +
            (it.url ? '<img src="' + _esc(it.url) + '" alt="' + _esc(it.caption || '') + '" loading="lazy">' : '') +
            (it.caption ? '<div class="sc-gallery-caption">' + _esc(it.caption) + '</div>' : '') +
          '</div>';
        }).join('') +
      '</div>';
    }
    html += '</div>';
  }

  // Credits
  if (credits.length > 0) {
    html += '<div class="sc-section">' +
      '<div class="sc-label">Credits</div>' +
      '<div class="sc-credits">' +
      credits.map(function(c) {
        var nameHtml = '';
        if (c.resume_url) {
          nameHtml = '<a href="' + _esc(c.resume_url) + '" target="_blank">' + _esc(c.name) + '</a>';
        } else {
          nameHtml = _esc(c.name);
        }
        return '<div class="sc-credit">' +
          '<div class="sc-credit-role">' + _esc(c.role) + '</div>' +
          '<div class="sc-credit-name">' + nameHtml + '</div>' +
        '</div>';
      }).join('') +
      '</div></div>';
  }

  // Tags
  if (tags.length > 0) {
    html += '<div class="sc-section">' +
      '<div class="sc-label">Tags</div>' +
      '<div class="sc-tags">' +
      tags.map(function(t) { return '<span class="sc-tag">' + _esc(t) + '</span>'; }).join('') +
      '</div></div>';
  }

  // Footer
  html += '<div class="sc-footer">Originsun Studio</div>';

  var showcaseEl = document.getElementById('showcase');
  showcaseEl.innerHTML = html;
  document.getElementById('loading').classList.add('fade');
  requestAnimationFrame(function() { showcaseEl.classList.add('visible'); });

  /* ── Event delegation ── */

  // Gallery lightbox
  var galleryGrid = document.getElementById('galleryGrid');
  if (galleryGrid) {
    galleryGrid.addEventListener('click', function(e) {
      var item = e.target.closest('.sc-gallery-item');
      if (!item) return;
      var idx = parseInt(item.dataset.lbIdx, 10);
      _openLightbox(gallery, idx);
    });
  }

  // Process gallery lightbox
  var processGallery = document.getElementById('processGallery');
  if (processGallery) {
    processGallery.addEventListener('click', function(e) {
      var item = e.target.closest('.sc-gallery-item');
      if (!item) return;
      var idx = parseInt(item.dataset.procIdx, 10);
      _openLightbox(processItems, idx);
    });
  }

  // Video cards (process timeline / media)
  document.querySelectorAll('[data-video-url]').forEach(function(card) {
    card.style.cursor = 'pointer';
    card.addEventListener('click', function() { _openVideo(card.dataset.videoUrl); });
  });
}

_load();
</script>
</body>
</html>
