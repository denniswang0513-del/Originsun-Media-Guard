<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume — Originsun Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0e0e0e; --bg2: #161616; --bg3: #1e1e1e;
  --text: #e8e6e3; --text2: #9a9590; --text3: #5a5550;
  --accent: #c8a45c; --accent2: #e8c97c;
  --border: #2a2825; --border2: #3a3835;
  --card: #141414; --card-hover: #1a1a1a;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Noto Sans TC', sans-serif;
  --radius: 2px;
  --max-w: 960px;
}
[data-theme="light"] {
  --bg: #f5f2ed; --bg2: #ebe8e3; --bg3: #e0ddd8;
  --text: #1a1815; --text2: #6a6560; --text3: #9a9590;
  --accent: #8a6a2a; --accent2: #a0802a;
  --border: #d5d0c8; --border2: #c5c0b8;
  --card: #faf8f5; --card-hover: #f0eee9;
}

html { scroll-behavior: smooth }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 15px;
  min-height: 100vh;
  transition: background .4s, color .4s;
}

/* ── Grain overlay ── */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── Loading ── */
#loading {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  transition: opacity .5s;
}
#loading.fade { opacity: 0; pointer-events: none }
.loading-bar { width: 120px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden }
.loading-bar::after { content:''; display:block; width:40%; height:100%; background:var(--accent); animation: loadSlide 1s ease infinite }
@keyframes loadSlide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
.loading-text { font-family: var(--font-display); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text3) }

/* ── Error ── */
#error { display:none; text-align:center; padding:120px 20px; color:var(--text3); font-family:var(--font-display) }
#error h2 { font-size:48px; font-weight:300; color:var(--text2); margin-bottom:8px }
#error p { font-size:14px; letter-spacing:1px }

/* ── Theme toggle ── */
.theme-toggle {
  position: fixed; top: 20px; right: 20px; z-index: 100;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all .3s;
}
.theme-toggle:hover { background: var(--border); color: var(--text) }

/* ── Main layout ── */
.resume { max-width: var(--max-w); margin: 0 auto; padding: 60px 24px 80px; opacity: 0; transform: translateY(20px); transition: all .6s ease }
.resume.visible { opacity: 1; transform: translateY(0) }

/* ── Hero ── */
.hero {
  display: flex; align-items: center; gap: 32px;
  padding-bottom: 48px; margin-bottom: 48px;
  border-bottom: 1px solid var(--border);
}
.hero-photo {
  width: 140px; height: 140px; border-radius: 50%; flex-shrink: 0;
  background: var(--bg3); border: 2px solid var(--border);
  overflow: hidden; position: relative;
}
.hero-photo img { width: 100%; height: 100%; object-fit: cover }
.hero-photo-empty {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 48px; color: var(--text3); font-family: var(--font-display); font-weight: 300;
}
.hero-info { flex: 1 }
.hero-name {
  font-family: var(--font-display); font-size: 36px; font-weight: 600;
  line-height: 1.2; margin-bottom: 4px; letter-spacing: -0.5px;
}
.hero-role {
  font-family: var(--font-display); font-size: 14px; font-weight: 400;
  color: var(--accent); letter-spacing: 3px; text-transform: uppercase;
}
.hero-bio { margin-top: 16px; color: var(--text2); font-size: 14px; line-height: 1.8 }

/* ── Section ── */
.section { margin-bottom: 56px; animation: fadeUp .6s ease both }
.section-label {
  font-family: var(--font-display); font-size: 10px; font-weight: 500;
  letter-spacing: 4px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border) }

/* ── Skills ── */
.skills { display: flex; flex-wrap: wrap; gap: 8px }
.skill-tag {
  padding: 6px 16px; font-size: 12px; font-weight: 500;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2); letter-spacing: 0.5px;
  font-family: var(--font-display);
  transition: all .3s;
}
.skill-tag:hover { border-color: var(--accent); color: var(--accent) }

/* ── Projects ── */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px }
.project-card {
  padding: 16px 20px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); transition: all .3s; cursor: default;
}
.project-card:hover { border-color: var(--border2); background: var(--card-hover) }
.project-name { font-weight: 500; font-size: 14px; margin-bottom: 4px }
.project-meta { font-size: 12px; color: var(--text3) }
.project-role { color: var(--accent); font-size: 12px; font-family: var(--font-display) }

/* ── Portfolio ── */
.portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px }
.portfolio-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; transition: all .3s;
  cursor: pointer; position: relative;
}
.portfolio-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3) }
.portfolio-thumb {
  width: 100%; aspect-ratio: 16/9; background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.portfolio-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s }
.portfolio-card:hover .portfolio-thumb img { transform: scale(1.05) }
.portfolio-thumb-empty { font-size: 32px; color: var(--text3) }
.portfolio-play {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.4); opacity: 0; transition: opacity .3s;
}
.portfolio-card:hover .portfolio-play { opacity: 1 }
.portfolio-play-icon {
  width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,.9);
  display: flex; align-items: center; justify-content: center;
}
.portfolio-play-icon::after {
  content: ''; display: block; width: 0; height: 0;
  border-style: solid; border-width: 8px 0 8px 14px;
  border-color: transparent transparent transparent #1a1a1a; margin-left: 3px;
}
.portfolio-info { padding: 14px 16px }
.portfolio-title { font-weight: 500; font-size: 14px; margin-bottom: 2px }
.portfolio-role { font-size: 12px; color: var(--text3) }

/* ── Video Modal ── */
.video-modal {
  position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.85);
  display: flex; align-items: center; justify-content: center; padding: 24px;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
.video-modal.active { opacity: 1; pointer-events: all }
.video-modal iframe { width: 100%; max-width: 900px; aspect-ratio: 16/9; border: none; border-radius: 4px }
.video-modal-close {
  position: absolute; top: 20px; right: 20px; width: 40px; height: 40px;
  background: rgba(255,255,255,.1); border: none; border-radius: 50%;
  color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── Timeline ── */
.timeline { display: flex; flex-direction: column; gap: 0 }
.timeline-item {
  display: flex; gap: 20px; padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.timeline-item:last-child { border-bottom: none }
.timeline-year {
  width: 80px; flex-shrink: 0; font-family: var(--font-display);
  font-size: 13px; color: var(--text3); padding-top: 2px;
}
.timeline-content { flex: 1 }
.timeline-title { font-weight: 500; font-size: 14px; margin-bottom: 2px }
.timeline-subtitle { font-size: 13px; color: var(--text2) }
.timeline-desc { font-size: 13px; color: var(--text3); margin-top: 4px }

/* ── Footer ── */
.resume-footer {
  text-align: center; padding-top: 48px; margin-top: 48px;
  border-top: 1px solid var(--border);
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: 2px; color: var(--text3);
}

/* ── Animations ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
.section:nth-child(2) { animation-delay:.1s }
.section:nth-child(3) { animation-delay:.15s }
.section:nth-child(4) { animation-delay:.2s }
.section:nth-child(5) { animation-delay:.25s }
.section:nth-child(6) { animation-delay:.3s }
.section:nth-child(7) { animation-delay:.35s }
.section:nth-child(8) { animation-delay:.4s }

/* ── Mobile ── */
@media (max-width: 600px) {
  .hero { flex-direction: column; text-align: center; gap: 20px }
  .hero-photo { width: 110px; height: 110px }
  .hero-name { font-size: 28px }
  .resume { padding: 40px 16px 60px }
  .portfolio-grid, .project-grid { grid-template-columns: 1fr }
  .timeline-item { flex-direction: column; gap: 4px }
  .timeline-year { width: auto }
  .theme-toggle { top: 12px; right: 12px }
}
</style>
</head>
<body>

<button class="theme-toggle" onclick="_toggleTheme()" title="切換主題">☀</button>

<div id="loading">
  <div class="loading-bar"></div>
  <div class="loading-text">Loading</div>
</div>

<div id="error">
  <h2>404</h2>
  <p>此簡歷不存在或尚未公開</p>
</div>

<div class="resume" id="resume"></div>

<div class="video-modal" id="videoModal" onclick="if(event.target===this)_closeVideo()">
  <button class="video-modal-close" onclick="_closeVideo()">✕</button>
  <iframe id="videoFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<script>
const params = new URLSearchParams(location.search);
const staffId = params.get('id');

function _toggleTheme() {
    const html = document.documentElement;
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀' : '☾';
}

function _esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function _videoId(url) {
    if (!url) return null;
    let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
    if (m) return { type: 'yt', id: m[1] };
    m = url.match(/vimeo\.com\/(\d+)/);
    if (m) return { type: 'vm', id: m[1] };
    return null;
}

function _embedUrl(v) {
    if (v.type === 'yt') return `https://www.youtube-nocookie.com/embed/${v.id}?autoplay=1`;
    if (v.type === 'vm') return `https://player.vimeo.com/video/${v.id}?autoplay=1`;
    return '';
}

function _thumbUrl(item) {
    if (item.thumbnail_url) return item.thumbnail_url;
    const v = _videoId(item.url);
    if (v && v.type === 'yt') return `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`;
    return '';
}

function _openVideo(url) {
    const v = _videoId(url);
    if (!v) { window.open(url, '_blank'); return; }
    document.getElementById('videoFrame').src = _embedUrl(v);
    document.getElementById('videoModal').classList.add('active');
}
function _closeVideo() {
    document.getElementById('videoFrame').src = '';
    document.getElementById('videoModal').classList.remove('active');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') _closeVideo(); });

async function _load() {
    if (!staffId) { _showError(); return; }
    try {
        const res = await fetch(`/api/v1/crm/public/staff/${staffId}/resume`);
        if (!res.ok) { _showError(); return; }
        const data = await res.json();
        _render(data);
    } catch (_) { _showError(); }
}

function _showError() {
    document.getElementById('loading').classList.add('fade');
    document.getElementById('error').style.display = 'block';
}

function _render(data) {
    const s = data.staff;
    const portfolio = data.portfolio || [];
    const projects = data.projects || [];
    const skills = s.skills || [];
    const experience = s.experience || [];
    const education = s.education || [];
    const awards = s.awards || [];

    document.title = `${s.name} — Originsun Studio`;

    let html = '';

    // Hero
    html += `<div class="hero">
        <div class="hero-photo">
            ${s.photo_url
                ? `<img src="${_esc(s.photo_url)}" alt="${_esc(s.name)}">`
                : `<div class="hero-photo-empty">${_esc((s.name || '?')[0])}</div>`}
        </div>
        <div class="hero-info">
            <div class="hero-name">${_esc(s.name)}</div>
            ${s.role ? `<div class="hero-role">${_esc(s.role)}</div>` : ''}
            ${s.bio ? `<div class="hero-bio">${_esc(s.bio)}</div>` : ''}
        </div>
    </div>`;

    // Skills
    if (skills.length > 0) {
        html += `<div class="section">
            <div class="section-label">專業技能</div>
            <div class="skills">${skills.map(sk => `<span class="skill-tag">${_esc(sk)}</span>`).join('')}</div>
        </div>`;
    }

    // Company Projects
    if (projects.length > 0) {
        html += `<div class="section">
            <div class="section-label">公司專案</div>
            <div class="project-grid">${projects.map(p => `
                <div class="project-card">
                    <div class="project-name">${_esc(p.project_name)}</div>
                    <div class="project-meta">${_esc(p.client_short_name || '')}</div>
                    ${p.role_in_project ? `<div class="project-role">${_esc(p.role_in_project)}</div>` : ''}
                </div>
            `).join('')}</div>
        </div>`;
    }

    // Portfolio
    if (portfolio.length > 0) {
        html += `<div class="section">
            <div class="section-label">作品集</div>
            <div class="portfolio-grid">${portfolio.map(item => {
                const thumb = _thumbUrl(item);
                const isVideo = !!_videoId(item.url);
                return `<div class="portfolio-card" onclick="${item.url ? `_openVideo('${_esc(item.url)}')` : ''}">
                    <div class="portfolio-thumb">
                        ${thumb ? `<img src="${_esc(thumb)}" alt="${_esc(item.title)}">` : `<div class="portfolio-thumb-empty">▶</div>`}
                        ${isVideo ? `<div class="portfolio-play"><div class="portfolio-play-icon"></div></div>` : ''}
                    </div>
                    <div class="portfolio-info">
                        <div class="portfolio-title">${_esc(item.title)}</div>
                        ${item.role_desc ? `<div class="portfolio-role">${_esc(item.role_desc)}</div>` : ''}
                    </div>
                </div>`;
            }).join('')}</div>
        </div>`;
    }

    // Experience
    if (experience.length > 0) {
        html += `<div class="section">
            <div class="section-label">工作經歷</div>
            <div class="timeline">${experience.map(e => `
                <div class="timeline-item">
                    <div class="timeline-year">${_esc(e.period || '')}</div>
                    <div class="timeline-content">
                        <div class="timeline-title">${_esc(e.company || '')}</div>
                        <div class="timeline-subtitle">${_esc(e.role || '')}</div>
                        ${e.desc ? `<div class="timeline-desc">${_esc(e.desc)}</div>` : ''}
                    </div>
                </div>
            `).join('')}</div>
        </div>`;
    }

    // Education
    if (education.length > 0) {
        html += `<div class="section">
            <div class="section-label">學歷</div>
            <div class="timeline">${education.map(e => `
                <div class="timeline-item">
                    <div class="timeline-year">${_esc(e.year || '')}</div>
                    <div class="timeline-content">
                        <div class="timeline-title">${_esc(e.school || '')}</div>
                        <div class="timeline-subtitle">${_esc(e.degree || '')}</div>
                    </div>
                </div>
            `).join('')}</div>
        </div>`;
    }

    // Awards
    if (awards.length > 0) {
        html += `<div class="section">
            <div class="section-label">獲獎紀錄</div>
            <div class="timeline">${awards.map(a => `
                <div class="timeline-item">
                    <div class="timeline-year">${_esc(a.year || '')}</div>
                    <div class="timeline-content">
                        <div class="timeline-title">${_esc(a.title || '')}</div>
                        ${a.desc ? `<div class="timeline-desc">${_esc(a.desc)}</div>` : ''}
                    </div>
                </div>
            `).join('')}</div>
        </div>`;
    }

    // Footer
    html += `<div class="resume-footer">Originsun Studio</div>`;

    document.getElementById('resume').innerHTML = html;
    document.getElementById('loading').classList.add('fade');
    requestAnimationFrame(() => document.getElementById('resume').classList.add('visible'));
}

_load();
</script>
</body>
</html>
